parameters:
  cluster_context:
    type: string
  cloud:
    type: string

steps:
- script: |
    set -eo pipefail

    echo "Starting Kubernetes cost analysis collection using Python client..."

    # Add buffer time for the test duration in minutes (ignore seconds)
    test_duration_int=${TEST_DURATION_MINUTES%.*}
    window=$((test_duration_int + 5))

    echo "Running Python cost analysis collector..."
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 cost_analysis/k8s_cost_collector.py \
      --cluster-context "$CLUSTER_CONTEXT" \
      --manifest-path "$OPEN_COST_SVC_MANIFEST" \
      --window "$window"m \
      --aggregate container \
      --scenario-name "$SCENARIO_NAME" \
      --run-id "$RUN_ID" \
      --scenario-stage-name "$SCENARIO_STAGE_NAME" \
      --result-dir "$RESULT_DIR" \
      --validate-availability

    echo "Cost analysis collection completed successfully"
    echo "##vso[task.setvariable variable=ALLOCATION_K8S_COST_FILE]$ALLOCATION_K8S_COST_FILE"
    echo "##vso[task.setvariable variable=ASSETS_K8S_COST_FILE]$ASSETS_K8S_COST_FILE"
  workingDirectory: modules/python
  displayName: "Collect kubernetes cost"
  continueOnError: true
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/cost_analysis/k8s_cost_collector.py
    RESULT_DIR: $(TEST_RESULTS_DIR)
    RUN_ID: $(RUN_ID)
    SCENARIO_NAME: $(SCENARIO_NAME)
    SCENARIO_STAGE_NAME: $(System.JobDisplayName)
    TEST_DURATION_MINUTES: $(EXECUTE_STEP_DURATION_MINUTES)
    CLUSTER_CONTEXT: ${{ parameters.cluster_context }}
    OPEN_COST_SVC_MANIFEST: $(Pipeline.Workspace)/s/steps/common/k8s-cost-analysis/open-cost-service.yaml
- template: /steps/publish-costs.yml
  parameters:
    cloud: ${{ parameters.cloud }}
