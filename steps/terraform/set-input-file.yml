parameters:
- name: cloud
  type: string
- name: regions
  type: object
- name: input_file_mapping
  type: object
  default: []

steps:
- script: |
    set -eu
    echo "${{ parameters.input_file_mapping[0].eastus2 }}"
    echo "${{ parameters.input_file_mapping[1].westus2 }}"
    echo "${{ convertToJson(parameters.input_file_mapping) }}"
    echo "${{ convertToJson(parameters.input_file_mapping[0]) }}"
    terraform_file_config=$(jq -n '{}')
    for item in $(echo '${{ convertToJson(parameters.input_file_mapping[0]) }}' | jq -c '.[]'); do
      echo $item  
    done
  displayName: 'Print Terraform Input File Mapping'
  env:
    INPUT_FILE_MAPPING: ${{ convertToJson(parameters.input_file_mapping) }}

- script: |
    set -eu
    regional_config=$(jq -n '{}')
    terraform_file_config=$(jq -n '{}')
    for item in $(echo "${{ convertToJson(parameters.input_file_mapping) }}" | jq -c '.[]'); do
      echo $item
      region=$(echo "$item" | jq -r 'keys[]')
      file_path=$(echo "$item" | jq -r '.[]')
      terraform_file_config=$(echo $terraform_file_config | jq --arg region "$region" --arg file_path "$file_path" '. + {($region): $file_path}')
    done

    multi_region=$(echo "$REGIONS" | jq -r 'if length > 1 then "true" else "false" end')
    echo "##vso[task.setvariable variable=MULTI_REGION]$multi_region"
    for region in $(echo "$REGIONS" | jq -r '.[]'); do
      if [ $terraform_file_config != "{}" ]; then        
        terraform_input_file=$(Pipeline.Workspace)/s/terraform_file_config["${region}"]
      elif [ $multi_region = "false" ]; then
        terraform_input_file=$(Pipeline.Workspace)/s/scenarios/$SCENARIO_TYPE/$SCENARIO_NAME/terraform-inputs/${CLOUD}.tfvars
      else
        terraform_input_file=$(Pipeline.Workspace)/s/scenarios/$SCENARIO_TYPE/$SCENARIO_NAME/terraform-inputs/${CLOUD}-${region}.tfvars
      fi
      regional_config=$(echo $regional_config | jq --arg region $region --arg file_path $terraform_input_file '. + {($region): {"TERRAFORM_INPUT_FILE" : $file_path}}')
    done
    regional_config_str=$(echo $regional_config | jq -c .)
    echo "##vso[task.setvariable variable=REGIONAL_CONFIG]$regional_config_str"

  displayName: 'Set Terraform Input File'
  condition: ne(variables['SKIP_RESOURCE_MANAGEMENT'], 'true')
  env:
    CLOUD: ${{ parameters.cloud }}
    REGIONS: ${{ convertToJson(parameters.regions) }}
