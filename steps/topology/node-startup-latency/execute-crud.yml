parameters:
- name: cloud
  type: string
  default: ''
- name: engine_input
  type: object
  default: {}
- name: regions
  type: object
  default: {}

steps:
- template: /steps/engine/crud/node-startup-latency/execute.yml
  parameters:
    cloud: ${{ parameters.cloud }}
    vm_size: $(VM_SIZE)
    pool_name: $(POOL_NAME)
    step_time_out: $(STEP_TIME_OUT)
    result_dir: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    cni_daemonset_label: $(CNI_DAEMONSET_LABEL)
    cni_blocking_taint: $(CNI_BLOCKING_TAINT)
