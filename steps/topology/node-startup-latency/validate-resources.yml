parameters:
- name: cloud
  type: string
- name: regions
  type: object
- name: engine
  type: string

steps:
- template: /steps/cloud/${{ parameters.cloud }}/update-kubeconfig.yml
  parameters:
    role: client
    region: ${{ parameters.regions[0] }}

- script: |
    set -euo pipefail

    echo "Waiting for AKS cluster to finish all ongoing operations..."
    aks_name=$(az resource list --resource-type Microsoft.ContainerService/managedClusters \
      --location '${{ parameters.regions[0] }}' \
      --query "[?(tags.run_id == '$(RUN_ID)' && tags.role == 'client')].name" --output tsv)
    aks_rg=$(RUN_ID)

    if [ -z "$aks_name" ]; then
      echo "No AKS cluster found with run_id=$(RUN_ID) and role=client"
      exit 1
    fi
    echo "Found AKS cluster: $aks_name in RG: $aks_rg"

    for i in $(seq 1 30); do
      state=$(az aks show -n "$aks_name" -g "$aks_rg" --query "provisioningState" -o tsv 2>/dev/null)
      echo "Attempt $i/30: provisioningState=$state"
      if [ "$state" = "Succeeded" ]; then
        echo "Cluster is ready."
        break
      fi
      if [ "$i" -eq 30 ]; then
        echo "##[error]Cluster still not ready after 5 minutes"
        exit 1
      fi
      sleep 10
    done
  displayName: "Wait for AKS cluster to settle"

- script: |
    set -euo pipefail

    echo "Installing upstream Cilium for BYOCNI cluster..."
    helm repo add cilium https://helm.cilium.io/
    helm repo update
    helm install cilium cilium/cilium --namespace kube-system \
      --set aksbyocni.enabled=true \
      --set nodeinit.enabled=true \
      --wait --timeout 5m

    echo "Waiting for all nodes to become Ready..."
    kubectl wait --for=condition=Ready node --all --timeout=300s
    kubectl get nodes -o wide
  displayName: "Install Cilium CNI (BYOCNI)"
  condition: eq(variables['INSTALL_CILIUM'], 'true')
