# steps/topology/k8s-cluster-crud-machine/validate-resources.yml
parameters:
  - name: cloud
    type: string
  - name: regions
    type: object
  - name: engine
    type: string

steps:
  - template: /steps/cloud/${{ parameters.cloud }}/update-kubeconfig.yml
    parameters:
      role: client
      region: ${{ parameters.regions[0] }}
