parameters:
- name: cloud
  type: string
  default: ''
- name: engine_input
  type: object
  default: {}
- name: regions
  type: object
  default: {}

steps:

- template: /steps/common/k8s-cost-analysis/collect.yml
  parameters:
    cluster_context: automatic

- template: /steps/publish-costs.yml
  parameters:
    cloud: ${{ parameters.cloud }}

- template: /steps/engine/aks-store-demo/single-cluster/configure-demo.yml
  parameters:
    action: delete
