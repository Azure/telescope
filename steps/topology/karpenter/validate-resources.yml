parameters:
- name: cloud
  type: string
- name: engine
  type: string
- name: regions
  type: object

steps:
- bash: |
    set -euo pipefail
    set -x
    kubectl get nodes --no-headers | awk '{print $2}' | grep -v 'Ready' > /dev/null && echo "Some nodes are not ready" || echo "All nodes are ready"
    kubetctl get nodepool default -o yaml
  env:
    CLOUD: ${{ parameters.cloud }}
  displayName: "Validate Karpenter setup"
