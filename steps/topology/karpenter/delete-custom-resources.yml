parameters:
- name: cloud
  type: string
  default: ''
- name: engine_input
  type: object
  default: {}
- name: region
  type: string

steps:
- script: |
    set -euo pipefail
    set -x
    
    kubectl delete --all nodeclaim --ignore-not-found
    kubectl delete --all nodepool --ignore-not-found
    if [[ "${{ parameters.cloud }}" == "aws" ]]; then
      kubectl delete --all ec2nodeclass
    fi
  env:
    CLOUD: ${{ parameters.cloud }}
    REGION: ${{ parameters.region }}
  displayName: "Clean up custom resources"
