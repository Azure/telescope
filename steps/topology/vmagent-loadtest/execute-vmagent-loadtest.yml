parameters:
- name: cloud
  type: string
  default: ''
- name: engine_input
  type: object
  default: {}
- name: regions
  type: object
  default: {}

steps:
# Cluster discovery, kubeconfigs, and pipeline variables are set by validate-resources.yml.
# This step only delegates to the engine.
- template: /steps/engine/vmagent-loadtest/execute.yml
  parameters:
    cp_kubeconfig: $(Pipeline.Workspace)/kubeconfigs/cp.kubeconfig
    dp_kubeconfig: $(Pipeline.Workspace)/kubeconfigs/dp.kubeconfig
    dp_resource_group: $(DP_AKS_RG)
    dp_cluster_name: $(DP_AKS_NAME)
