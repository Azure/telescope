parameters:
- name: cloud
  type: string
  default: ''
- name: engine_input
  type: object
  default: {}
- name: regions
  type: object
  default: {}

steps:
- script: |
    set -euo pipefail

    region=${{ parameters.regions[0] }}

    # Resolve CP cluster kubeconfig
    CP_AKS=$(az resource list --resource-type Microsoft.ContainerService/managedClusters --location $region \
      --query "[?(tags.run_id == '${RUN_ID}' && tags.role == 'cp')].name" --output tsv)
    CP_RG=$(az resource list --resource-type Microsoft.ContainerService/managedClusters --location $region \
      --query "[?(tags.run_id == '${RUN_ID}' && tags.role == 'cp')].resourceGroup" --output tsv)

    # Resolve DP cluster kubeconfig
    DP_AKS=$(az resource list --resource-type Microsoft.ContainerService/managedClusters --location $region \
      --query "[?(tags.run_id == '${RUN_ID}' && tags.role == 'dp')].name" --output tsv)
    DP_RG=$(az resource list --resource-type Microsoft.ContainerService/managedClusters --location $region \
      --query "[?(tags.run_id == '${RUN_ID}' && tags.role == 'dp')].resourceGroup" --output tsv)

    echo "CP cluster: $CP_AKS (RG: $CP_RG)"
    echo "DP cluster: $DP_AKS (RG: $DP_RG)"

    # Get dedicated kubeconfigs for each cluster
    mkdir -p $(Pipeline.Workspace)/kubeconfigs
    az aks get-credentials -n "$CP_AKS" -g "$CP_RG" --file $(Pipeline.Workspace)/kubeconfigs/cp.kubeconfig --overwrite-existing
    az aks get-credentials -n "$DP_AKS" -g "$DP_RG" --file $(Pipeline.Workspace)/kubeconfigs/dp.kubeconfig --overwrite-existing

    # Read matrix variables with defaults
    TIERS="${TIERS:-150,500,1000}"
    SOAK_MINUTES="${SOAK_MINUTES:-10}"
    REAL_TARGETS="${REAL_TARGETS:-false}"
    RUN_LABEL="${RUN_LABEL:-}"

    EXTRA_ARGS="--resource-group $DP_RG --dp-cluster-name $DP_AKS"
    if [[ "$REAL_TARGETS" == "true" ]]; then
      EXTRA_ARGS="$EXTRA_ARGS --real-targets"
    fi
    if [[ -n "$RUN_LABEL" ]]; then
      EXTRA_ARGS="$EXTRA_ARGS --run-label $RUN_LABEL"
    fi

    # Save common args for per-tier steps
    echo "$EXTRA_ARGS" > $(Pipeline.Workspace)/kubeconfigs/extra_args.txt
    echo "$SOAK_MINUTES" > $(Pipeline.Workspace)/kubeconfigs/soak_minutes.txt

    # Run each tier individually: execute → collect → cleanup → next tier
    IFS=',' read -ra TIER_LIST <<< "$TIERS"
    for TIER in "${TIER_LIST[@]}"; do
      TIER=$(echo "$TIER" | xargs)  # trim whitespace
      echo ""
      echo "######################################################################"
      echo "# TIER $TIER — execute"
      echo "######################################################################"

      python3 modules/python/vmagent_loadtest/main.py \
        --cp-kubeconfig $(Pipeline.Workspace)/kubeconfigs/cp.kubeconfig \
        --dp-kubeconfig $(Pipeline.Workspace)/kubeconfigs/dp.kubeconfig \
        --tiers "$TIER" \
        --warm-up-minutes "$SOAK_MINUTES" \
        $EXTRA_ARGS

      echo ""
      echo "######################################################################"
      echo "# TIER $TIER — collect results"
      echo "######################################################################"

      WORK_DIR=$(ls -td /tmp/fake-cp-loadtest.* 2>/dev/null | head -1)
      if [[ -n "$WORK_DIR" && -d "${WORK_DIR}/results" ]]; then
        mkdir -p $(Pipeline.Workspace)/results
        cp -v "${WORK_DIR}/results"/*.json $(Pipeline.Workspace)/results/ 2>/dev/null || true
        if [[ -d "${WORK_DIR}/pprof" ]]; then
          mkdir -p $(Pipeline.Workspace)/results/pprof
          cp -rv "${WORK_DIR}/pprof"/. $(Pipeline.Workspace)/results/pprof/ 2>/dev/null || true
        fi
        if [[ -d "${WORK_DIR}/raw" ]]; then
          mkdir -p $(Pipeline.Workspace)/results/raw
          cp -rv "${WORK_DIR}/raw"/. $(Pipeline.Workspace)/results/raw/ 2>/dev/null || true
        fi
        if [[ -d "${WORK_DIR}/diagnostics" ]]; then
          mkdir -p $(Pipeline.Workspace)/results/diagnostics
          cp -rv "${WORK_DIR}/diagnostics"/. $(Pipeline.Workspace)/results/diagnostics/ 2>/dev/null || true
        fi
        echo "Tier $TIER results collected."
        ls -l $(Pipeline.Workspace)/results/
      else
        echo "##vso[task.logissue type=warning;]No results found for tier $TIER"
      fi

      echo ""
      echo "######################################################################"
      echo "# TIER $TIER — cleanup namespace"
      echo "######################################################################"

      NS_PREFIX="loadtest-"
      if [[ -n "$RUN_LABEL" ]]; then
        NS_PREFIX="loadtest-${RUN_LABEL}-"
      fi
      NS="${NS_PREFIX}${TIER}"

      kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/cp.kubeconfig delete ns "$NS" --wait=false --ignore-not-found=true || true
      kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/dp.kubeconfig delete ns "$NS" --wait=false --ignore-not-found=true || true

      # Wait for namespace termination (max 120s)
      for i in $(seq 1 24); do
        CP_GONE=$(kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/cp.kubeconfig get ns "$NS" 2>&1 && echo "no" || echo "yes")
        DP_GONE=$(kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/dp.kubeconfig get ns "$NS" 2>&1 && echo "no" || echo "yes")
        if [[ "$CP_GONE" == "yes" && "$DP_GONE" == "yes" ]]; then
          echo "Namespace $NS deleted on both clusters."
          break
        fi
        echo "  waiting for $NS to terminate... ($i/24)"
        sleep 5
      done

      echo "Tier $TIER complete."
    done

    echo ""
    echo "All tiers complete. Results:"
    ls -lR $(Pipeline.Workspace)/results/ 2>/dev/null || echo "No results."
  displayName: "Execute VMAgent load test (per-tier loop)"
  env:
    TIERS: $(TIERS)
    SOAK_MINUTES: $(SOAK_MINUTES)
    REAL_TARGETS: $(REAL_TARGETS)
    RUN_LABEL: $(RUN_LABEL)
