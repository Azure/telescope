parameters:
  - name: cloud
    type: string
  - name: regions
    type: object
    default: {}
  - name: engine_input
    type: object
    default: {}

steps:
  - template: /steps/cloud/${{ parameters.cloud }}/collect-cloud-info.yml
    parameters:
      region: ${{ parameters.regions[0] }}
  - template: /steps/engine/nccl/collect.yml
  - script: |
      run_id=$(Build.BuildId)-$(System.JobId)
      echo "Run ID: $run_id"
      echo "##vso[task.setvariable variable=RUN_ID]$run_id"
    displayName: "Set unique Run ID before publish"
