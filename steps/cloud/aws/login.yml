parameters:
- name: region
  type: string
  default: us-east-1
- name: credential_type
  type: string

steps:
- ${{ if eq(parameters.credential_type, 'service_connection') }}:
  - task: AWSShellScript@1
    inputs:
      awsCredentials: $(AWS_SERVICE_CONNECTION)
      regionName: ${{ parameters.region }}
      scriptType: 'inline'
      inlineScript: |
        echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID;issecret=true]$AWS_ACCESS_KEY_ID"
        echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY;issecret=true]$AWS_SECRET_ACCESS_KEY"
        if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
          echo "Session token found (${AWS_SESSION_TOKEN:0:4}...); setting AWS_SESSION_TOKEN variable"
          echo "##vso[task.setvariable variable=AWS_SESSION_TOKEN;issecret=true]$AWS_SESSION_TOKEN"
        fi
    displayName: 'Get login credentials'

- ${{ if eq(parameters.credential_type, 'oidc_manual') }}:
  - bash: |
      set -eu
      echo "Requesting OIDC token from Azure DevOps..."
      echo "OIDC_REQUEST_URI: ${OIDC_REQUEST_URI:-<not set>}"
      echo "SYSTEM_ACCESS_TOKEN length: ${#SYSTEM_ACCESS_TOKEN}"
      RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
        -H "Authorization: Bearer $SYSTEM_ACCESS_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"aud":"api://AzureADTokenExchange"}' \
        "$OIDC_REQUEST_URI?serviceConnectionId=$SERVICE_CONNECTION_ID&api-version=7.1-preview.1")
      HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
      BODY=$(echo "$RESPONSE" | sed '$d')
      echo "HTTP status: $HTTP_STATUS"
      if [ "$HTTP_STATUS" != "200" ]; then
        echo "##[error]OIDC token request failed (HTTP $HTTP_STATUS): $BODY"
        exit 1
      fi
      OIDC_TOKEN=$(echo "$BODY" | jq -r '.oidcToken')

      if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
        echo "##[error]Failed to obtain OIDC token from Azure DevOps"
        exit 1
      fi
      echo "OIDC token obtained successfully"

      echo "Assuming AWS role via OIDC..."
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$ROLE_ARN" \
        --role-session-name "ado-$BUILD_ID" \
        --web-identity-token "$OIDC_TOKEN" \
        --duration-seconds 3600 \
        --output json)

      echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID;issecret=true]$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')"
      echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY;issecret=true]$(echo "$CREDS" | jq -r '.Credentials.SecretAccessKey')"
      echo "##vso[task.setvariable variable=AWS_SESSION_TOKEN;issecret=true]$(echo "$CREDS" | jq -r '.Credentials.SessionToken')"
      echo "AWS credentials obtained via OIDC (expires: $(echo "$CREDS" | jq -r '.Credentials.Expiration'))"
    displayName: 'Get AWS credentials via OIDC'
    env:
      SYSTEM_ACCESS_TOKEN: $(System.AccessToken)
      OIDC_REQUEST_URI: $(System.OidcRequestUri)
      SERVICE_CONNECTION_ID: $(AWS_SERVICE_CONNECTION)
      ROLE_ARN: 'arn:aws:iam::891516228446:role/AzureDevOps-akstelescope-OIDC'
      BUILD_ID: $(Build.BuildId)

- bash: |
    set -eu
    echo "login to AWS in $REGION"

    aws configure set aws_access_key_id "$AWS_ACCESS_KEY"
    aws configure set aws_secret_access_key "$AWS_SECRET_KEY"
    # ADO passes the literal string '$(AWS_SESSION_TOKEN)' when the pipeline variable is undefined.
    # We can't use that literal directly because ADO expands $(...) in script bodies too.
    ADO_LITERAL='$'"(AWS_SESSION_TOKEN)"
    if [ "${AWS_SESSION:-}" = "$ADO_LITERAL" ]; then
      echo "No session token; AWS_SESSION contains unresolved ADO variable literal"
      AWS_SESSION=""
    fi
    if [ -n "${AWS_SESSION:-}" ]; then
      echo "Session token found (${AWS_SESSION:0:4}...); configuring aws_session_token"
      aws configure set aws_session_token "$AWS_SESSION"
    fi
    aws configure set default.region "$REGION"
    aws configure list
    echo "##vso[task.setvariable variable=AWS_DEFAULT_REGION]$REGION"
  displayName: "AWS Login"
  env:
    AWS_ACCESS_KEY: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_SESSION: $(AWS_SESSION_TOKEN)
    REGION: ${{ parameters.region }}
