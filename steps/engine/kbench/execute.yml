parameters:
  - name: cloud
    type: string
    default: ""
  - name: engine_input
    type: object
    default: {}
  - name: region
    type: string

steps:
  - script: |
      set -eo pipefail

      PYTHONPATH=$PYTHONPATH:$(pwd) python3 $PYTHON_SCRIPT_FILE \
        ${KBENCH_IMAGE} $RESULTS_DIR ${HOME}/.kube/config
    workingDirectory: modules/python
    env:
      ${{ if eq(parameters.cloud, 'azure') }}:
        CLOUD: aks
      ${{ else }}:
        CLOUD: ${{ parameters.cloud }}
      REGION: ${{ parameters.region }}
      PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/kbench/execute.py
      KBENCH_IMAGE: ${{ parameters.engine_input.image }}
      RESULTS_DIR: $(Pipeline.Workspace)/s/modules/python/kbench/results
    displayName: "Run Benchmark"
