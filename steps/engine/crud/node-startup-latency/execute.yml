parameters:
  result_dir: ""
  vm_size: ""
  pool_name: ""
  cloud: ""
  step_time_out: 600
  cni_daemonset_label: ""

steps:
- script: |
    set -eo pipefail

    CNI_LABEL_ARG=""
    if [ -n "$CNI_DAEMONSET_LABEL" ]; then
      CNI_LABEL_ARG="--cni-daemonset-label $CNI_DAEMONSET_LABEL"
    fi

    # Trigger autoscaler by deploying probe pod and collect latency metrics
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" autoscale-latency \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --step-timeout "$STEP_TIME_OUT" \
      $CNI_LABEL_ARG

  displayName: 'Autoscale Latency for ${{ parameters.cloud }}'
  workingDirectory: modules/python
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/crud/main.py
    VM_SIZE: ${{ parameters.vm_size }}
    POOL_NAME: ${{ parameters.pool_name }}
    CLOUD: ${{ parameters.cloud }}
    STEP_TIME_OUT: ${{ parameters.step_time_out }}
    RESULT_DIR: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    CNI_DAEMONSET_LABEL: ${{ parameters.cni_daemonset_label }}


