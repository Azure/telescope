parameters:
  result_dir: ""
  vm_size: ""
  create_node_count: ""
  scale_node_count: ""
  scale_step_up_count: ""
  pool_name: ""
  cloud: ""
  step_time_out: 600
  step_wait_time: 30
  gpu_node_pool: false
  deployment_name: ""
  number_of_deployments: 1
  number_of_statefulsets: 1
  replicas: 10
  manifest_dir: ""

steps:
- script: |
    set -eo pipefail

    # Create Node Pool
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" create \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --vm-size "$VM_SIZE" \
      --node-count "$CREATE_NODE_COUNT" \
      --step-timeout "$STEP_TIME_OUT" \
      ${GPU_NODE_POOL:+--gpu-node-pool} \
      --capacity-type "${CAPACITY_TYPE:-ON_DEMAND}"

    # Scale Up Node Pool
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" scale \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --target-count "$SCALE_NODE_COUNT" \
      --scale-step-size "$SCALE_STEP_SIZE" \
      --step-wait-time "$STEP_WAIT_TIME" \
      --step-timeout "$STEP_TIME_OUT" \
      ${GPU_NODE_POOL:+--gpu-node-pool}

  displayName: 'Execute K8s Create & Scale Up Operations for ${{ parameters.cloud }}'
  workingDirectory: modules/python
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/crud/main.py
    VM_SIZE: ${{ parameters.vm_size }}
    CREATE_NODE_COUNT: ${{ parameters.create_node_count }}
    SCALE_NODE_COUNT: ${{ parameters.scale_node_count }}
    SCALE_STEP_SIZE: ${{ parameters.scale_step_up_count }}
    POOL_NAME: ${{ parameters.pool_name }}
    CLOUD: ${{ parameters.cloud }}
    STEP_TIME_OUT: ${{ parameters.step_time_out }}
    RESULT_DIR: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    GPU_NODE_POOL: ${{ parameters.gpu_node_pool }}
    STEP_WAIT_TIME: ${{ parameters.step_wait_time }}
    ${{ if eq(parameters.cloud, 'aws') }}:
      CAPACITY_TYPE: $(CAPACITY_TYPE)

- script: |
    set -eo pipefail

    # Deploy Workloads
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" deployment \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --number-of-deployments "$NUMBER_OF_DEPLOYMENTS" \
      --replicas "$REPLICAS" \
      --manifest-dir "$MANIFEST_DIR" \
      --step-timeout "$STEP_TIME_OUT" \
      ${GPU_NODE_POOL:+--gpu-node-pool}
  displayName: 'Execute K8s Workload operations for ${{ parameters.cloud }}'
  workingDirectory: modules/python
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/crud/main.py
    POOL_NAME: ${{ parameters.pool_name }}
    CLOUD: ${{ parameters.cloud }}
    STEP_TIME_OUT: ${{ parameters.step_time_out }}
    RESULT_DIR: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    GPU_NODE_POOL: ${{ parameters.gpu_node_pool }}
    DEPLOYMENT_NAME: ${{ parameters.deployment_name }}
    NUMBER_OF_DEPLOYMENTS: ${{ parameters.number_of_deployments }}
    REPLICAS: ${{ parameters.replicas }}
    MANIFEST_DIR: ${{ parameters.manifest_dir }}

- script: |
    set -eo pipefail

    # Deploy StatefulSets
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" statefulset \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --number-of-statefulsets "$NUMBER_OF_STATEFULSETS" \
      --replicas "$REPLICAS" \
      --manifest-dir "$MANIFEST_DIR" \
      --step-timeout "$STEP_TIME_OUT" \
      ${GPU_NODE_POOL:+--gpu-node-pool}
  displayName: 'Execute K8s StatefulSet operations for ${{ parameters.cloud }}'
  workingDirectory: modules/python
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/crud/main.py
    POOL_NAME: ${{ parameters.pool_name }}
    CLOUD: ${{ parameters.cloud }}
    STEP_TIME_OUT: ${{ parameters.step_time_out }}
    RESULT_DIR: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    GPU_NODE_POOL: ${{ parameters.gpu_node_pool }}
    NUMBER_OF_STATEFULSETS: ${{ parameters.number_of_statefulsets }}
    REPLICAS: ${{ parameters.replicas }}
    MANIFEST_DIR: ${{ parameters.manifest_dir }}

- script: |
    set -eo pipefail

    # Scale Down Node Pool
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" scale \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --target-count "$CREATE_NODE_COUNT" \
      --scale-step-size "$SCALE_STEP_SIZE" \
      --step-wait-time "$STEP_WAIT_TIME" \
      --step-timeout "$STEP_TIME_OUT" \
      ${GPU_NODE_POOL:+--gpu-node-pool}

    # Delete Node Pool
    PYTHONPATH=$PYTHONPATH:$(pwd) python3 "$PYTHON_SCRIPT_FILE" delete \
      --cloud "$CLOUD" \
      --run-id "$RUN_ID" \
      --result-dir "$RESULT_DIR" \
      --node-pool-name "$POOL_NAME" \
      --step-timeout "$STEP_TIME_OUT"
  displayName: 'Execute K8s Scale Down & Delete Operations for ${{ parameters.cloud }}'
  condition: always()
  workingDirectory: modules/python
  env:
    PYTHON_SCRIPT_FILE: $(Pipeline.Workspace)/s/modules/python/crud/main.py
    VM_SIZE: ${{ parameters.vm_size }}
    CREATE_NODE_COUNT: ${{ parameters.create_node_count }}
    SCALE_NODE_COUNT: ${{ parameters.scale_node_count }}
    SCALE_STEP_SIZE: ${{ parameters.scale_step_up_count }}
    POOL_NAME: ${{ parameters.pool_name }}
    CLOUD: ${{ parameters.cloud }}
    STEP_TIME_OUT: ${{ parameters.step_time_out }}
    RESULT_DIR: $(System.DefaultWorkingDirectory)/$(RUN_ID)
    GPU_NODE_POOL: ${{ parameters.gpu_node_pool }}
    STEP_WAIT_TIME: ${{ parameters.step_wait_time }}
    ${{ if eq(parameters.cloud, 'aws') }}:
      CAPACITY_TYPE: $(CAPACITY_TYPE)
