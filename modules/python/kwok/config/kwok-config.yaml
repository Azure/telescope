---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kwok
  namespace: kube-system
  labels:
    app: kwok-controller
data:
  kwok.yaml: |
    apiVersion: config.kwok.x-k8s.io/v1alpha1
    kind: KwokConfiguration
    options:
      enableProfilingHandler: false
      enableContentionProfiling: false
      enablePodsOnNodeSyncListPager: false
      enablePodsOnNodeSyncStreamWatch: true
      nodeLeaseParallelism: {{node_lease_parallelism}}
      podPlayStageParallelism: {{pod_play_stage_parallelism}}
      nodePlayStageParallelism: {{node_play_stage_parallelism}}
      nodePort: 10247
      cidr: {{cidr}}
      manageAllNodes: false
      manageNodesWithAnnotationSelector: 'kwok.x-k8s.io/node=fake'
      manageNodesWithLabelSelector: ''
      manageSingleNode: ''
      nodeLeaseDurationSeconds: {{node_lease_duration_seconds}}
      enableCRDs:
      - Stage
      - Metric
