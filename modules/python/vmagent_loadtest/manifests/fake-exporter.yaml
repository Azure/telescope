# Fake Exporter Pods — deployed on the "dataplane" cluster
# Stateless pods that expose /metrics endpoint with synthetic Prometheus metrics.
# Deployed in a shared namespace (reusable across tests).
#
# Template variables:
#   __EXPORTER_REPLICAS__  — number of exporter pods
#   __EXPORTER_PORT__      — metrics port (default: 9090)
---
apiVersion: v1
kind: Namespace
metadata:
  name: loadtest-exporters
  labels:
    loadtest: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-metrics
  namespace: loadtest-exporters
data:
  # Static fake metrics — each pod serves these on /metrics
  metrics.txt: |
    # HELP node_cpu_seconds_total Fake CPU usage
    # TYPE node_cpu_seconds_total counter
    node_cpu_seconds_total{cpu="0",mode="idle"} 12345.67
    node_cpu_seconds_total{cpu="0",mode="system"} 234.56
    node_cpu_seconds_total{cpu="1",mode="idle"} 12300.00
    node_cpu_seconds_total{cpu="1",mode="system"} 245.67
    # HELP node_memory_MemTotal_bytes Fake total memory
    # TYPE node_memory_MemTotal_bytes gauge
    node_memory_MemTotal_bytes 8589934592
    # HELP node_memory_MemAvailable_bytes Fake available memory
    # TYPE node_memory_MemAvailable_bytes gauge
    node_memory_MemAvailable_bytes 4294967296
    # HELP node_network_receive_bytes_total Fake network received bytes
    # TYPE node_network_receive_bytes_total counter
    node_network_receive_bytes_total{device="eth0"} 987654321
    # HELP node_network_transmit_bytes_total Fake network transmitted bytes
    # TYPE node_network_transmit_bytes_total counter
    node_network_transmit_bytes_total{device="eth0"} 123456789
    # HELP node_disk_read_bytes_total Fake disk read bytes
    # TYPE node_disk_read_bytes_total counter
    node_disk_read_bytes_total{device="sda"} 555555555
    # HELP up Target is up
    # TYPE up gauge
    up 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-exporter
  namespace: loadtest-exporters
  labels:
    app: fake-exporter
spec:
  replicas: __EXPORTER_REPLICAS__
  selector:
    matchLabels:
      app: fake-exporter
  template:
    metadata:
      labels:
        app: fake-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "__EXPORTER_PORT__"
    spec:
      containers:
        - name: exporter
          image: python:3.11-alpine
          command:
            - python3
            - -c
            - |
              import http.server, os, socket
              port = int(os.environ.get("PORT", "__EXPORTER_PORT__"))
              metrics = open("/metrics/metrics.txt").read()
              # Add per-pod identity label
              hostname = socket.gethostname()
              metrics = metrics.replace("up 1", f'up{{instance="{hostname}"}} 1')

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/metrics":
                          self.send_response(200)
                          self.send_header("Content-Type", "text/plain")
                          self.end_headers()
                          self.wfile.write(metrics.encode())
                      elif self.path == "/healthz":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"ok")
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, *args): pass

              http.server.HTTPServer(("", port), Handler).serve_forever()
          ports:
            - name: metrics
              containerPort: __EXPORTER_PORT__
          livenessProbe:
            httpGet:
              path: /healthz
              port: __EXPORTER_PORT__
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: metrics
              mountPath: /metrics
              readOnly: true
      volumes:
        - name: metrics
          configMap:
            name: fake-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: fake-exporter
  namespace: loadtest-exporters
  labels:
    app: fake-exporter
spec:
  clusterIP: None
  selector:
    app: fake-exporter
  ports:
    - name: metrics
      port: __EXPORTER_PORT__
      targetPort: __EXPORTER_PORT__
