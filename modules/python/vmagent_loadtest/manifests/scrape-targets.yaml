apiVersion: v1
kind: Namespace
metadata:
  name: fake-exporter
  labels:
    loadtest: "true"
---
# ── RBAC: allow any service account to discover pods ──────────
# vmagent runs in the CCP namespace with an unknown SA.
# This grants all SAs read access to fake-exporter namespace
# for pod/service/endpoint discovery. Safe for a test namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fake-exporter-discovery
  namespace: fake-exporter
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fake-exporter-discovery
  namespace: fake-exporter
subjects:
  - kind: Group
    name: system:serviceaccounts
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: fake-exporter-discovery
  apiGroup: rbac.authorization.k8s.io
---
# ── fake-nodeexp ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fake-nodeexp-headless
  namespace: fake-exporter
spec:
  clusterIP: None
  selector:
    app: fake-nodeexp
  ports:
    - name: metrics
      port: 19100
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fake-nodeexp
  namespace: fake-exporter
spec:
  serviceName: fake-nodeexp-headless
  replicas: __REPLICAS__
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: fake-nodeexp
  template:
    metadata:
      labels:
        app: fake-nodeexp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "19100"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: fake-exporter
          image: __EXPORTER_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 19100
          env:
            - name: PORT
              value: "19100"
            - name: PROFILE
              value: "__PROFILE__"
          resources:
            requests:
              cpu: "5m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
---
