# ── fake-ksm ──────────────────────────────────────────────────
# kube-state-metrics: high-cardinality, fewer replicas (1 per cluster in real)
# but we run __REPLICAS__ for load. Heaviest baseline (~5000 series/replica).
apiVersion: v1
kind: Service
metadata:
  name: fake-ksm-headless
  namespace: fake-exporter
spec:
  clusterIP: None
  selector:
    app: fake-ksm
  ports:
    - name: metrics
      port: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fake-ksm
  namespace: fake-exporter
spec:
  serviceName: fake-ksm-headless
  replicas: __REPLICAS__
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: fake-ksm
  template:
    metadata:
      labels:
        app: fake-ksm
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: fake-exporter
          image: __EXPORTER_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PROFILE
              value: "__PROFILE__"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
