# VictoriaMetrics single-node — remote write receiver for load testing.
# Stands in for the production adx-mon collector to validate the full
# scrape → remote-write pipeline.
#
# Template variables:
#   __NAMESPACE__    — test namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle
  namespace: __NAMESPACE__
  labels:
    app: vmsingle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmsingle
  template:
    metadata:
      labels:
        app: vmsingle
    spec:
      containers:
        - name: vmsingle
          image: __VMSINGLE_IMAGE__
          args:
            - -httpListenAddr=:8428
            - -retentionPeriod=1d
            - -search.latencyOffset=5s
          ports:
            - name: http
              containerPort: 8428
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  namespace: __NAMESPACE__
  labels:
    app: vmsingle
spec:
  selector:
    app: vmsingle
  ports:
    - name: http
      port: 8428
      targetPort: 8428
