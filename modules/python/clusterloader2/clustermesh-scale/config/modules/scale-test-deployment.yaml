apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Name}}
  labels:
    group: {{.Group}}
spec:
  replicas: {{.Replicas}}
  selector:
    matchLabels:
      name: {{.Name}}
  template:
    metadata:
      labels:
        name: {{.Name}}
        group: {{.Group}}
    spec:
      {{if .MockMode}}
      # MOCK mode: schedule the workload Pods onto the KWOK virtual nodes (which
      # carry the kwok.x-k8s.io/node:NoSchedule taint and type=kwok label) so the
      # mock-cilium-agents process them, instead of the real thin worker pool.
      nodeSelector:
        type: kwok
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Exists
          effect: NoSchedule
      {{end}}
      containers:
        - name: pause
          image: mcr.microsoft.com/oss/kubernetes/pause:3.6
          resources:
            requests:
              cpu: 1m
              memory: 5Mi
            limits:
              cpu: 5m
              memory: 20Mi
