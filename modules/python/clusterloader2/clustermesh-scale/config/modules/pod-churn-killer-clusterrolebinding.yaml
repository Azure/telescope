apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{.Name}}
  labels:
    group: {{.Group}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{.RoleName}}
subjects:
  - kind: ServiceAccount
    name: {{.SAName}}
    namespace: {{.SANamespace}}
