## CNP module provides a module for creating / deleting CNPs.

## Input params
{{$actionName := .actionName}}
{{$namespaces := .namespaces}}
{{$cnpsPerNamespace := .cnpsPerNamespace}}
{{$nameOfNs := .nameOfNs}}

steps:
- name: "{{$actionName}} k8s CNPs"
  phases:
  - namespaceRange:
      min: 1
      max: {{$namespaces}}
    replicasPerNamespace: {{$cnpsPerNamespace}}
    tuningSet: Sequence
    objectBundle:
    - basename: cnp
      objectTemplatePath: cnp_template.yaml
    objectParams:
      {{- range $i := until $namespaces }}
      - name: namespace
        value: {{printf "%s-%d" $nameOfNs $i}}
      {{- end }}
    