## CCNP module provides a module for creating / deleting CCNPs.

## Input params
{{$actionName := .actionName}}
{{$ccnps := .ccnps}}

steps:
- name: "{{$actionName}} {{$ccnps}} k8s CCNPs"
  phases:
    - replicas: {{$ccnps}}
      tuningSet: Sequence
      objectBundle:
      - basename: ccnp
        objectTemplatePath: ccnp_template.yaml