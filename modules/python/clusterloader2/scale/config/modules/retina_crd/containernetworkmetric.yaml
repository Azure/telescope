{{$namespaces := .namespaces}}
apiVersion: acn.azure.com/v1alpha1
kind: ContainerNetworkMetric
metadata:
  name: container-network-metric
spec:
  filters:
    - metric: flow
      includeFilters:
        {{range $i := Loop $namespaces}}
        - name: "flow-filter-{{ AddInt $i 1 }}"
          from:
            namespacedPod:
              - scale-test-{{ AddInt $i 1 }}/fortio-client-
          to:
            namespacedPod:
              - scale-test-{{ AddInt $i 1 }}/fortio-server-
          verdict:
            - "forwarded"
            - "dropped"
          protocol:
            - "tcp"
        {{end}}
