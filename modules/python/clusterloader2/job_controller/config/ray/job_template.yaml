apiVersion: batch/v1
kind: Job
metadata:
  name: {{.Name}}
  labels:
    group: {{.Group}}
spec:
  template:
    metadata:
      labels:
        group: {{.Group}}
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: type
                operator: In
                values:
                - kwok
      tolerations:
      - key: "kwok.x-k8s.io/node"
        operator: "Equal"
        value: "fake"
        effect: "NoSchedule"
      containers:
      - image: rayproject/ray:2.8.0-gpu
        name: {{.Name}}
        command: ["sh", "-c", "echo Starting Ray job; ray start --head --port=6379 --dashboard-port=8265 --dashboard-host=0.0.0.0 --disable-usage-stats; sleep 30; echo Ray job completed!"]
        ports:
        - containerPort: 6379
          name: ray-client
        - containerPort: 8265
          name: ray-dashboard
        resources:
          requests:
            nvidia.com/gpu: 8
            memory: "4Gi"
            cpu: "2000m"
          limits:
            nvidia.com/gpu: 8
            memory: "8Gi"
            cpu: "4000m"
        env:
        - name: RAY_DISABLE_IMPORT_WARNING
          value: "1"