trigger: none

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: byocni-cilium-5k50

stages:
  - stage: azure_westus2_byocni_5k50 # format: <cloud>[_<region>]+ (e.g. azure_eastus2, aws_eastus_westus)
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml # must keep as is
        parameters:
          cloud: azure
          regions:
            - westus2
          terraform_input_file_mapping:
            - westus2: "scenarios/perf-eval/byocni-cilium-5k50/terraform-inputs/azure.tfvars"
          topology: cluster-churn-byocni
          engine: clusterloader2
          engine_input:
            image: "ghcr.io/azure/clusterloader2:v20241022"
          matrix:
            azure_byocni_cilium_5k50:
              cpu_per_node: 4
              node_count: 5000
              node_per_step: 250
              pods_per_node: 50
              repeats: 1
              scale_timeout: "180m"
              cilium_enabled: True
              cl2_config_file: cluster-churn.yaml
              initial_expected_nodes: 6
              validation_timeout_in_minutes: 60
              install_cns_with_acn: true
              cilium_manifest_dir: "1.17"
              cilium_image_registry: acnpublic.azurecr.io
              cilium_version_tag: 6fd7d20f03-260506
              cns_version: v1.7.12
              azure_ipam_version: v0.4.0
              # Optional overrides:
              # cilium_image_registry: "<your-registry>"
              # cilium_version_tag: "<your-cilium-tag>"
          max_parallel: 1
          credential_type: service_connection # required
          ssh_key_enabled: false
          timeout_in_minutes: 1500
