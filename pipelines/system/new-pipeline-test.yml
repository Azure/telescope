trigger: none

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: osguard-resource-consume

stages:
  - stage: azure_swedencentral # format: <cloud>[_<region>]+ (e.g. azure_eastus2, aws_eastus_westus)
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml # must keep as is
        parameters:
          cloud: azure # e.g. azure, aws
          regions: # list of regions
            - swedencentral # e.g. eastus2
          topology: cri-resource-consume # e.g. cluster-autoscaler
          engine: clusterloader2 # e.g. clusterloader2
          engine_input:
            image: "ghcr.io/azure/clusterloader2:v20241016"
          matrix: # list of test parameters to customize the provisioned resources
            n10-p300-memory:
              node_count: 10
              max_pods: 30
              repeats: 1
              operation_timeout: 3m
              load_type: memory
            n10-p300-cpu:
              node_count: 10
              max_pods: 30
              repeats: 1
              operation_timeout: 3m
              load_type: cpu
            n10-p700-cpu:
              node_count: 10
              max_pods: 70
              repeats: 1
              operation_timeout: 7m
              load_type: cpu
          max_parallel: 3 # required
          credential_type: service_connection # required
          ssh_key_enabled: false
          timeout_in_minutes: 120 # if not specified, default is 60


