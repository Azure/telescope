trigger: none

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-cluster-crud-machine
  USE_LATEST_GA_K8S_VERSION: true

stages:
  - stage: azure_canadacentral_small_scale_10
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            canadacentral-small-scale-10:
              vm_size: Standard_D2_v3
              pool_name: smallpool1
              scale_machine_count: 10
              machine_workers: 5
              use_batch_api: "false"
              step_time_out: 900
          max_parallel: 1
          timeout_in_minutes: 360
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: azure_canadacentral_medium_scale_500
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            canadacentral-medium-scale-500:
              vm_size: Standard_D2_v3
              pool_name: mediump1
              scale_machine_count: 500
              machine_workers: 10
              use_batch_api: "true"
              step_time_out: 2400
          max_parallel: 1
          timeout_in_minutes: 360
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: azure_canadacentral_large_scale_1000
    dependsOn:
      - azure_canadacentral_small_scale_10
      - azure_canadacentral_medium_scale_500
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            canadacentral-large-scale-1000:
              vm_size: Standard_D2_v3
              pool_name: largep1
              scale_machine_count: 1000
              machine_workers: 20
              use_batch_api: "true"
              step_time_out: 3600
          max_parallel: 1
          timeout_in_minutes: 360
          credential_type: service_connection
          ssh_key_enabled: false
