trigger: none

pool:
  name: 'AKS-Telescope-Airlock'

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-gpu-cluster-crud

stages:
  - stage: azure_australiaeast
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - australiaeast
          topology: k8s-crud-gpu
          engine: crud
          matrix:
            node_readiness_timing_test:
              GPU_NODE_POOL: ""
              pool_name: nrtiming
              vm_size: Standard_D4s_v3
              create_node_count: 2
              scale_node_count: 3
              scale_step_size: 1
              step_time_out: 600
              step_wait_time: 30
              count: 1
              replicas: 1
              completions: 1
              manifest_dir: ""
          max_parallel: 1
          credential_type: service_connection
          ssh_key_enabled: false
          timeout_in_minutes: 60
