trigger: none

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-cluster-crud-machine
  USE_LATEST_GA_K8S_VERSION: true

stages:
  - stage: azure_canadacentral_small_machine_pool
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            small_machine_pool:
              vm_size: Standard_D2_v3
              pool_name: smallpool1
              scale_machine_count: 1
              machine_workers: 1
              use_batch_api: "false"
              step_time_out: 600
          max_parallel: 1
          timeout_in_minutes: 180
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: azure_canadacentral_medium_machine_pool_cli
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            medium_machine_pool_cli:
              vm_size: Standard_D2_v3
              pool_name: mediump1
              scale_machine_count: 10
              machine_workers: 5
              use_batch_api: "false"
              step_time_out: 900
          max_parallel: 1
          timeout_in_minutes: 180
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: azure_canadacentral_large_machine_pool_cli
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            large_machine_pool_cli:
              vm_size: Standard_D2_v3
              pool_name: largep1
              scale_machine_count: 50
              machine_workers: 10
              use_batch_api: "false"
              step_time_out: 1200
          max_parallel: 1
          timeout_in_minutes: 180
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: azure_canadacentral_large_machine_pool_batch
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - canadacentral
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            large_machine_pool_batch:
              vm_size: Standard_D2_v3
              pool_name: largep2
              scale_machine_count: 100
              machine_workers: 4
              use_batch_api: "true"
              step_time_out: 1200
          max_parallel: 1
          timeout_in_minutes: 180
          credential_type: service_connection
          ssh_key_enabled: false
