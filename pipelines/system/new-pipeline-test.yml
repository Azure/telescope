              cl2_prom_snapshot_storage_account: "cmshscaleprom"
              cl2_prom_snapshot_container: "snapshots"
              trigger_reason: ${{ variables['Build.Reason'] }}
          max_parallel: 1
          timeout_in_minutes: 180
