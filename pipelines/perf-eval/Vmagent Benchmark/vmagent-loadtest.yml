trigger: none

# schedules:
#   - cron: "0 6 * * 1"
#     displayName: "6:00 AM Weekly (Monday)"
#     branches:
#       include:
#         - main
#     always: true

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: vmagent-loadtest

stages:
  - stage: azure_vmagent_loadtest
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - westus2
          topology: vmagent-loadtest
          engine: vmagent-loadtest
          matrix:
            small_fake:
              TIERS: "50,100,150,300"
              SOAK_MINUTES: 10
              REAL_TARGETS: "false"
              RUN_LABEL: "small-fake"
            real_targets:
              TIERS: "50,100,150,300"
              SOAK_MINUTES: 15
              REAL_TARGETS: "true"
              RUN_LABEL: "real-targets"
          max_parallel: 3
          timeout_in_minutes: 360
          credential_type: service_connection
          ssh_key_enabled: false

  - stage: compare_results
    dependsOn: azure_vmagent_loadtest
    condition: succeededOrFailed()
    jobs:
      - job: compare
        displayName: "Compare load test results"
        timeoutInMinutes: 30
        steps:
        - checkout: self
        - template: /steps/engine/vmagent-loadtest/compare.yml
          parameters:
            fake_artifact: "vmagent-loadtest-results-azure small_fake"
            real_artifact: "vmagent-loadtest-results-azure real_targets"
