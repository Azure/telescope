trigger: none

variables:
  SCENARIO_TYPE: perf-eval

stages:
  # Azure CNI Overlay + Cilium dataplane
  - stage: azure_cilium
    variables:
      SCENARIO_NAME: node-startup-latency-cilium
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - westus2
          topology: node-startup-latency
          engine: crud
          matrix:
            cilium_node_startup:
              pool_name: userpool
              vm_size: Standard_D4ds_v5
              create_node_count: 1
              scale_node_count: 2
              step_time_out: 600
              cni_daemonset_label: "k8s-app=cilium"
              cni_blocking_taint: "node.cilium.io/agent-not-ready"
          max_parallel: 1
          timeout_in_minutes: 60
          credential_type: service_connection
          ssh_key_enabled: false

  # BYOCNI + upstream Cilium
  - stage: azure_cilium_byocni
    variables:
      SCENARIO_NAME: node-startup-latency-cilium-byocni
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - westus2
          topology: node-startup-latency
          engine: crud
          matrix:
            byocni_node_startup:
              pool_name: userpool
              vm_size: Standard_D4ds_v5
              create_node_count: 1
              scale_node_count: 2
              step_time_out: 600
              cni_daemonset_label: "k8s-app=cilium"
              cni_blocking_taint: "node.cilium.io/agent-not-ready"
              install_cilium: "true"
          max_parallel: 1
          timeout_in_minutes: 60
          credential_type: service_connection
          ssh_key_enabled: false

  # Kubenet (no CNI daemonset)
  - stage: azure_kubenet
    variables:
      SCENARIO_NAME: node-startup-latency-kubenet
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - westus2
          topology: node-startup-latency
          engine: crud
          matrix:
            kubenet_node_startup:
              pool_name: userpool
              vm_size: Standard_D4ds_v5
              create_node_count: 1
              scale_node_count: 2
              step_time_out: 600
              cni_daemonset_label: ""
          max_parallel: 1
          timeout_in_minutes: 60
          credential_type: service_connection
          ssh_key_enabled: false

  # Azure CNI Overlay (no Cilium)
  - stage: azure_cni
    variables:
      SCENARIO_NAME: node-startup-latency-azure-cni
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - westus2
          topology: node-startup-latency
          engine: crud
          matrix:
            azure_cni_node_startup:
              pool_name: userpool
              vm_size: Standard_D4ds_v5
              create_node_count: 1
              scale_node_count: 2
              step_time_out: 600
              cni_daemonset_label: ""
          max_parallel: 1
          timeout_in_minutes: 60
          credential_type: service_connection
          ssh_key_enabled: false
