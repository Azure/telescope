trigger: none

parameters:
  - name: max_pods
    displayName: "Max Pods per Node"
    type: number
    default: 60
  - name: custom_kubelet_config
    displayName: "Custom Kubelet Config (JSON String)"
    type: string  # The parameter type is string
    default: ""
  - name: custom_metadata
    displayName: "Custom Metadata for Test Run"
    type: string
    default: ""

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-node-stress
  CUSTOM_RUN_ID: "${{ parameters.custom_metadata }}"

stages:
  - stage: westus3_stress
    dependsOn: []
    jobs:
    - template: /jobs/competitive-test.yml
      parameters:
        cloud: azure
        regions:
          - westus3
        terraform_input_file_mapping:
          - westus3: "scenarios/perf-eval/k8s-node-stress/terraform-inputs/azure-ubuntu2204.tfvars"
        topology: k8s-resource-pressure
        engine: clusterloader2
        engine_input:
          image: "ghcr.io/azure/clusterloader2:v20250513"
        run_id: ${{ variables.CUSTOM_RUN_ID }}
        matrix:
          baseline:
            matrix_key: baseline
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: false
            os_sku: Ubuntu2204
            vm_size: Standard_D8_v4
          u2204-d4v4:
            matrix_key: u2204-d4v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2204
            vm_size: Standard_D4_v4
          u2204-d8v4:
            matrix_key: u2204-d8v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2204
            vm_size: Standard_D8_v4
          u2204-d16v4:
            matrix_key: u2204-d16v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2204
            vm_size: Standard_D16_v4
          u2404-d4v4:
            matrix_key: u2404-d4v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2404
            vm_size: Standard_D4_v4
          u2404-d8v4:
            matrix_key: u2404-d8v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2404
            vm_size: Standard_D8_v4
          u2404-d16v4:
            matrix_key: u2404-d16v4
            node_count: 1
            max_pods: ${{ parameters.max_pods }}
            repeats: 1
            operation_timeout: 3m
            load_type: memory
            pod_startup_latency_threshold: 27s
            kubernetes_version: "1.34"
            scrape_kubelets: True
            scrape_containerd: True
            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: True
            custom_kubelet_config: ${{ parameters.custom_kubelet_config }}
            os_sku: Ubuntu2404
            vm_size: Standard_D16_v4
        max_parallel: 9
        timeout_in_minutes: 120
        credential_type: service_connection
        ssh_key_enabled: false
