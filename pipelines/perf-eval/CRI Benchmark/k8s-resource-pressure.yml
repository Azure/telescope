            scrape_ksm: True
            scrape_metrics_server: True
            use_custom_kubelet: false
            os_sku: Ubuntu2204
            vm_size: Standard_D8_v5
          base-100-u2204-d16v5:
            matrix_key: base-100-u2204-d16v5
