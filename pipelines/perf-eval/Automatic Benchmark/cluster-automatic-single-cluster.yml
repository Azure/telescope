trigger: none

schedules:
  - cron: "0 */4 * * *"
    displayName: "Everyday at 11:00 AM"
    branches:
      include:
        - main
    always: true

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: cluster-automatic

stages:
  - stage: azure_eastus2
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml # must keep as is
        parameters:
          cloud: azure
          regions:
            - swedencentral
          terraform_input_file_mapping:
            - swedencentral: "scenarios/perf-eval/cluster-automatic/terraform-inputs/azure-automatic-benchmark.tfvars"
          topology: cluster-automatic
          engine: clusterloader2
          engine_input:
            image: "ghcr.io/azure/clusterloader2:v20250513"
          matrix:
            automatic-acn-off:
              cpu_per_node: 2
              node_count: 10
              pod_count: 10
              scale_up_timeout: "150m"
              scale_down_timeout: "150m"
              node_label_selector: "karpenter.sh/nodepool = default"
              node_selector: "{karpenter.sh/nodepool: default}"
              loop_count: 1
              warmup_deployment: false
              vm_size: Standard_D2s_v4
              capacity_type: on-demand
          max_parallel: 1 # required
          credential_type: service_connection # required
          ssh_key_enabled: false
          timeout_in_minutes: 120
