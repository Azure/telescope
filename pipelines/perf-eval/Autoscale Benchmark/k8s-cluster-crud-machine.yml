trigger: none

schedules:
  - cron: "0 9 * * *"
    displayName: "Daily 9am UTC"
    branches:
      include:
        - main
    always: true

variables:
  SCENARIO_TYPE: perf-eval
  SCENARIO_NAME: k8s-cluster-crud-machine  # matches ado-telescope: feeds Kusto table k8s_cluster_crud_machine_main
  USE_LATEST_GA_K8S_VERSION: true

stages:
  - stage: azure_eastus_small_machine_pool
    dependsOn: []
    jobs:
      - template: /jobs/competitive-test.yml
        parameters:
          cloud: azure
          regions:
            - eastus
          topology: k8s-cluster-crud-machine
          engine: machine
          matrix:
            small_machine_pool:
              vm_size: Standard_D2_v3
              pool_name: smallpool1
              scale_machine_count: 1
              machine_workers: 1
              use_batch_api: "false"
              step_time_out: 600
          max_parallel: 1
          timeout_in_minutes: 180
          credential_type: service_connection
          ssh_key_enabled: false
