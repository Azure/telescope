    steps:
    - bash: echo s1 j3 step0 xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      displayName: Step 3-0
    - bash: echo s1 j3 step1 xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      displayName: Step 3-1
