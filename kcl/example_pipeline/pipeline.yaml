name: Example Pipeline
pool: AKS-Telescope-Airlock
trigger:
- v2
jobs:
- job: benchmarking
  displayName: Benchmarking
  timeoutInMinutes: 1440
  steps:
  - bash: |2

      set -eo pipefail

      job_id="$(System.JobId)"
      RUN_ID=$(Build.BuildId)-${job_id:0:8}
      echo "Run ID: $RUN_ID"

      echo "##vso[task.setvariable variable=RUN_ID]$RUN_ID"
    displayName: Set Run ID
  - bash: |-
      set -exo pipefail
      pip3 install --upgrade "pip<24"
      pip3 install -r $(Pipeline.Workspace)/s/modules/python/requirements.txt
    displayName: Install Python dependencies
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az account set --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219"
        az config set defaults.location="westus2"
        az account show
    displayName: Login to Azure
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |+
        set -exo pipefail

        az group create \
          --name "$(RUN_ID)" \
          --location "westus2" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \

    displayName: Create resource group in westus2 (b8ceb4e5-f05b-4562-a9f5-14acb1f24219)
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az aks create \
          --name "example-yaolei" \
          --resource-group "$(RUN_ID)" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --location "westus2" \
          --kubernetes-version "1.35.0" \
          --dns-name-prefix "example-yaolei-dns" \
          --tier standard \
          --nodepool-name systempool \
          --node-count 3 \
          --node-vm-size "Standard_D8S_v4" \
          --max-pods 250 \
          --network-plugin azure \
          --network-plugin-mode overlay \
          --pod-cidr 10.64.0.0/10 \
          --service-cidr 10.0.0.0/16 \
          --dns-service-ip 10.0.0.10 \
          --outbound-type managedNATGateway \
          --nat-gateway-managed-outbound-ip-count 10 \
          --enable-managed-identity \
          --generate-ssh-keys
    displayName: Create cluster
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        while true; do
          STATE=$(az aks show \
            --name "stg-H2-yaolei" \
            --resource-group "$(RUN_ID)" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --query "provisioningState" \
            --output tsv)
          echo "Cluster provisioning state: $STATE"
          if [ "$STATE" = "Succeeded" ]; then
            echo "Cluster is ready."
            break
          elif [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
            echo "Cluster failed with state: $STATE."
            exit 1
          else
            echo "Provisioning state: $STATE. Retry in 30 seconds"
          fi
          sleep 30
        done
    displayName: Wait for cluster to succeed
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        deadline=$(($(date +%s) + 600))
        sleep_between=30
        attempt=0
        while :; do
          attempt=$((attempt + 1))
          set +e
          output=$(az aks nodepool add \
            --cluster-name "stg-H2-yaolei" \
            --resource-group "$(RUN_ID)" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --name "cl2pool" \
            --node-count 4 \
            --node-vm-size "Standard_D8S_v4" \
            --mode User \
            --node-taints cl2pool=true:NoSchedule 2>&1)
          rc=$?
          set -e
          echo "$output"
          if [ $rc -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -qiE "OperationNotAllowed"; then
            now=$(date +%s)
            if [ $now -ge $deadline ]; then
              echo "Retriable error persisted past 600s retry window ($attempt attempts); giving up."
              exit $rc
            fi
            remaining=$((deadline - now))
            echo "Attempt $attempt matched retriable pattern; retrying in $sleep_between seconds ($remaining seconds remain in retry window)."
            sleep $sleep_between
          else
            echo "Non-retriable error (rc=$rc); giving up after attempt $attempt."
            exit $rc
          fi
        done
    displayName: Create node pool cl2pool
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az aks get-credentials \
          --name "example-yaolei" \
          --resource-group "$(RUN_ID)" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --overwrite-existing
    displayName: Get credentials for example-yaolei
  - script: |2-

      set -exo pipefail
      export PYTHONPATH=$PYTHONPATH:$(pwd)
      python3 kwok/kwok.py   --action create   --node-count 100   --node-manifest-path $(Pipeline.Workspace)/s/kcl/example_pipeline/kwok-node.yaml
    workingDirectory: modules/python
    displayName: Create KWOK Nodes
  - script: |2-

      set -exo pipefail
      export PYTHONPATH=$PYTHONPATH:$(pwd)
      python3 kwok/kwok.py   --action validate   --node-count 100   --node-manifest-path $(Pipeline.Workspace)/s/kcl/example_pipeline/kwok-node.yaml
    workingDirectory: modules/python
    displayName: Validate KWOK Nodes
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        set +eo pipefail
        kubectl create namespace "clusterloader2" || true
        kubectl apply -f $(Pipeline.Workspace)/s/kcl/example_pipeline/cl2.yaml
        # Wait
        consecutive_errors=0
        while true; do
          # Under consistent API server errors, we would want to exit early instead of waiting for the entire timeout duration.
          phases="$(kubectl get pods --namespace="clusterloader2" -o jsonpath='{range .items[*]}{.status.phase}{"\n"}{end}' 2>/tmp/kubectl_err)"
          kubectl_exit_code=$?
          if [ $kubectl_exit_code -ne 0 ]; then
            consecutive_errors=$((consecutive_errors + 1))
            echo "kubectl get pods failed (exit_code=$kubectl_exit_code, consecutive=$consecutive_errors/20):"
            cat /tmp/kubectl_err
            if [ "$consecutive_errors" -ge "20" ]; then
              echo "API server unresponsive for $consecutive_errors consecutive polls; aborting."
              exit 1
            fi
            sleep 30
            continue
          fi
          consecutive_errors=0

          total=0
          terminal=0

          if [ -n "$phases" ]; then
            while IFS= read -r phase; do
              if [ -z "$phase" ]; then
                continue
              fi

              total=$((total + 1))
              if [ "$phase" = "Succeeded" ] || [ "$phase" = "Failed" ]; then
                terminal=$((terminal + 1))
              fi
            done <<< "$phases"
          fi

          if [ "$total" -gt 0 ] && [ "$terminal" -eq "$total" ]; then
            echo "All cl2 pods reached terminal state (Succeeded or Failed)"
            kubectl get pods --namespace="clusterloader2" -l job-name=cl2 -o wide

            break
          fi

          sleep 30
        done
    displayName: Run cluster loader 2
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        for pod in $(kubectl get pods --namespace="clusterloader2" -l job-name=cl2 -o jsonpath='{.items[*].metadata.name}'); do
          echo "===== Logs for pod: $pod ====="
          kubectl logs --namespace="clusterloader2" "$pod" || true
        done
    displayName: Print cl2 pod logs
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        STATUS="succeeded"

        # Check if any cl2 pod failed
        FAILED=$(kubectl get pods --namespace="clusterloader2" -l job-name=cl2 -o jsonpath='{range .items[*]}{.status.phase}{"\n"}{end}' | grep -c "^Failed$" || true)
        if [ "$FAILED" -gt 0 ]; then
          STATUS="failed"
        fi

        cat > /tmp/run-result.json << EOF

        {
          "timestamp": "${TIMESTAMP}",
          "run_id": "$(RUN_ID)",
          "run_url": "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)",
          "pipeline": "$(Build.DefinitionName)",
          "result": {
            "cl2_status": "${STATUS}",
            "region": "westus2"
          }
        }
        EOF
        cat /tmp/run-result.json
    displayName: Collect cl2 pods status
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az storage blob upload \
          --account-name "telescopev2" \
          --subscription "137f0351-8235-42a6-ac7a-6b46be2d21c7" \
          --container-name "aks" \
          --name "$(RUN_ID)/run-result.json" \
          --file /tmp/run-result.json \
          --auth-mode key
    displayName: Upload result to storage account
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az group delete --name "$(RUN_ID)" --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" --yes
    condition: always()
    displayName: Delete resource group (b8ceb4e5-f05b-4562-a9f5-14acb1f24219)
