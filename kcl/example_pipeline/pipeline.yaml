name: Example Pipeline
pool: AKS-Telescope-Ubuntu-EastUS2
trigger:
- v2
jobs:
- job: benchmarking
  displayName: Benchmarking
  steps:
  - bash: |-
      if [ -n "$RUN_ID" ]; then
        RUN_ID=$RUN_ID
      else
        job_id="$(System.JobId)"
        RUN_ID=$(Build.BuildId)-${job_id:0:8}
      fi
      echo "Run ID: $RUN_ID"
      echo "##vso[task.setvariable variable=RUN_ID]$RUN_ID"
    displayName: Set Run ID
    env:
      RUN_ID: $RUN_ID
  - bash: wget -q https://kcl-lang.io/script/install-cli.sh -O - | /bin/bash
    displayName: Install KCL
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        az account set --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219"
        az config set defaults.location="westus2"
        az account show
    displayName: Login to Azure
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        az group create --name "$RESOURCE_GROUP" --location "westus2" --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219"
    displayName: Create resource group $RESOURCE_GROUP in westus2 (b8ceb4e5-f05b-4562-a9f5-14acb1f24219)
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        az cloud update --endpoint-resource-manager https://eastus2euap.management.azure.com/
        az rest \
          --method put \
          --uri "/subscriptions/b8ceb4e5-f05b-4562-a9f5-14acb1f24219/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.ContainerService/managedClusters/stg-H2-yaolei?api-version=2026-01-02-preview" \
          --body "
        {
            \"location\": \"westus2\",
            \"identity\": { \"type\": \"SystemAssigned\" },
            \"sku\": {
              \"name\": \"Base\",
              \"tier\": \"Standard\"
            },
            \"tags\": {
              \"exempted_by_qi\": \"36609072\",
              \"SkipAKSCluster\": \"true\",
              \"SkipASMAzSecPackAutoConfig\": \"true\",
              \"SkipLinuxAzSecPack\": \"true\"
            },
            \"properties\": {
              \"controlPlaneScalingProfile\": {\"scalingSize\": \"H2\"},
              \"kubernetesVersion\": \"1.33.0\",
              \"dnsPrefix\": \"stg-H2-yaolei-dns\",
              \"agentPoolProfiles\": [
                {
                  \"name\": \"systempool\",
                  \"mode\": \"System\",
                  \"count\": 3,
                  \"vmSize\": \"Standard_D8S_v4\",
                  \"osType\": \"Linux\"
                }
              ],
            \"networkProfile\": {
               \"networkPlugin\": \"azure\",
               \"networkPluginMode\": \"overlay\",
               \"podCidr\": \"10.64.0.0/10\",
               \"serviceCidr\": \"10.0.0.0/16\",
               \"dnsServiceIP\": \"10.0.0.10\",
               \"outboundType\": \"managedNATGateway\",
               \"natGatewayProfile\": {
                  \"managedOutboundIPProfile\": {
                    \"count\": 10
                  }
                }
              }
            }
          }"
    displayName: Create cluster
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        while true; do
          STATE=$(az aks show \
            --name "stg-H2-yaolei" \
            --resource-group "$RESOURCE_GROUP" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --query "provisioningState" \
            --output tsv)
          echo "Cluster provisioning state: $STATE"
          if [ "$STATE" = "Succeeded" ]; then
            echo "Cluster is ready."
            break
          elif [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
            echo "Cluster failed with state: $STATE."
            exit 1
          else
            echo "Provisioning state: $STATE. Retry in 30 seconds"
          fi
          sleep 30
        done
    displayName: Wait for cluster to succeed
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        az aks nodepool add \
          --cluster-name "stg-H2-yaolei" \
          --resource-group "$RESOURCE_GROUP" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --name "cl2pool" \
          --node-count 1 \
          --node-vm-size "Standard_D8S_v4" \
          --mode User \
          --node-taints cl2pool=true:NoSchedule
    displayName: Create node pool cl2pool
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        while true; do
          STATE=$(az aks nodepool show \
            --cluster-name "stg-H2-yaolei" \
            --resource-group "$RESOURCE_GROUP" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --name "cl2pool" \
            --query "provisioningState" \
            --output tsv)
          echo "Node pool provisioning state: $STATE"
          if [ "$STATE" = "Succeeded" ]; then
            echo "Node pool is ready."
            break
          elif [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
            echo "Node pool failed with state: $STATE."
            exit 1
          else
            echo "Provisioning state: $STATE. Retry in 30 seconds"
          fi
          sleep 30
        done
    displayName: Wait for node pool cl2pool to succeed
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        az aks get-credentials \
          --name "stg-H2-yaolei" \
          --resource-group "$RESOURCE_GROUP" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --overwrite-existing
    displayName: Get credentials for stg-H2-yaolei
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |2

        kubectl create namespace "clusterloader2" || true
        kcl run example_pipeline/cluster_loader_2_job.k \
          -D image="ghcr.io/azure/clusterloader2:v20250513" \
          -D testConfig="testing/load/config.yaml" \
          -D namespace="clusterloader2" \
          -D nodePool="cl2pool" \
          -D taintPrefix="cl2pool" \
          -S output | kubectl apply -f -
        kubectl wait job/cl2 \
          --for=condition=complete \
          --timeout=3600s \
          --namespace="clusterloader2" || \
          (kubectl logs job/cl2 --namespace="clusterloader2"; exit 1)
    displayName: Run cluster loader 2
