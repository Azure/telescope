name: Hyperscale API Server Executing Seats
pool: AKS-Telescope-Ubuntu-EastUS2
trigger:
- v2
parameters:
- name: run_id
  displayName: Run ID (leave empty to auto-generate)
  type: string
  default: default
jobs:
- job: benchmarking
  displayName: Benchmarking
  timeoutInMinutes: 1440
  steps:
  - bash: |2

      set -exo pipefail
      if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "default" ]; then
        echo "Using provided Run ID: $RUN_ID"
      else
        job_id="$(System.JobId)"
        RUN_ID=$(Build.BuildId)-${job_id:0:8}
        echo "Run ID: $RUN_ID"
      fi
      echo "##vso[task.setvariable variable=RUN_ID]$RUN_ID"
    displayName: Set Run ID
    env:
      RUN_ID: ${{ parameters.run_id }}
  - bash: |-
      set -exo pipefail
      pip3 install --upgrade "pip<24"
      pip3 install -r $(Pipeline.Workspace)/s/modules/python/requirements.txt
    displayName: Install Python dependencies
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az account set --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219"
        az config set defaults.location="westus2"
        az account show
    displayName: Login to Azure
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az group create --name "$(RUN_ID)" --location "westus2" --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219"
    displayName: Create resource group $(RUN_ID) in westus2 (b8ceb4e5-f05b-4562-a9f5-14acb1f24219)
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az cloud update --endpoint-resource-manager https://eastus2euap.management.azure.com/
        az rest \
          --method put \
          --uri "/subscriptions/b8ceb4e5-f05b-4562-a9f5-14acb1f24219/resourceGroups/$(RUN_ID)/providers/Microsoft.ContainerService/managedClusters/stg-H2-hyperscale-apiserver-seats?api-version=2026-01-02-preview" \
          --body "
        {
            \"location\": \"westus2\",
            \"identity\": { \"type\": \"SystemAssigned\" },
            \"sku\": {
              \"name\": \"Base\",
              \"tier\": \"Standard\"
            },
            \"tags\": {
              \"SkipAKSCluster\": \"true\",
              \"SkipASMAzSecPackAutoConfig\": \"true\",
              \"SkipLinuxAzSecPack\": \"true\"
            },
            \"properties\": {
              \"controlPlaneScalingProfile\": {\"scalingSize\": \"H2\"},
              \"kubernetesVersion\": \"1.33.0\",
              \"dnsPrefix\": \"stg-H2-hyperscale-apiserver-seats-dns\",
              \"agentPoolProfiles\": [
                {
                  \"name\": \"systempool\",
                  \"mode\": \"System\",
                  \"count\": 30,
                  \"vmSize\": \"Standard_D8S_v4\",
                  \"osType\": \"Linux\",
                  \"maxPods\": 250
                }
              ],
            \"networkProfile\": {
               \"networkPlugin\": \"azure\",
               \"networkPluginMode\": \"overlay\",
               \"podCidr\": \"10.64.0.0/10\",
               \"serviceCidr\": \"10.0.0.0/16\",
               \"dnsServiceIP\": \"10.0.0.10\",
               \"outboundType\": \"managedNATGateway\",
               \"natGatewayProfile\": {
                  \"managedOutboundIPProfile\": {
                    \"count\": 10
                  }
                }
              }
            }
          }"
    displayName: Create cluster
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        while true; do
          STATE=$(az aks show \
            --name "stg-H2-hyperscale-apiserver-seats" \
            --resource-group "$(RUN_ID)" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --query "provisioningState" \
            --output tsv)
          echo "Cluster provisioning state: $STATE"
          if [ "$STATE" = "Succeeded" ]; then
            echo "Cluster is ready."
            break
          elif [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
            echo "Cluster failed with state: $STATE."
            exit 1
          else
            echo "Provisioning state: $STATE. Retry in 30 seconds"
          fi
          sleep 30
        done
    displayName: Wait for cluster to succeed
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az aks get-credentials \
          --name "stg-H2-hyperscale-apiserver-seats" \
          --resource-group "$(RUN_ID)" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --overwrite-existing
    displayName: Get credentials for stg-H2-hyperscale-apiserver-seats
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az aks nodepool add \
          --cluster-name "stg-H2-hyperscale-apiserver-seats" \
          --resource-group "$(RUN_ID)" \
          --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
          --name "kwokpool" \
          --node-count 1 \
          --node-vm-size "Standard_D8S_v4" \
          --mode User \
          --node-taints kwok=true:NoSchedule \
          --labels kwok=true
    displayName: Create node pool kwokpool
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        while true; do
          STATE=$(az aks nodepool show \
            --cluster-name "stg-H2-hyperscale-apiserver-seats" \
            --resource-group "$(RUN_ID)" \
            --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" \
            --name "kwokpool" \
            --query "provisioningState" \
            --output tsv)
          echo "Node pool provisioning state: $STATE"
          if [ "$STATE" = "Succeeded" ]; then
            echo "Node pool is ready."
            break
          elif [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
            echo "Node pool failed with state: $STATE."
            exit 1
          else
            echo "Provisioning state: $STATE. Retry in 30 seconds"
          fi
          sleep 30
        done
    displayName: Wait for node pool kwokpool to succeed
  - script: |2-

      set -exo pipefail
      export PYTHONPATH=$PYTHONPATH:$(pwd)
      python3 kwok/kwok.py   --action create   --node-count 100   --node-manifest-path $(Pipeline.Workspace)/s/kcl/hyperscale_apiserver_executing_seats/kwok-node.yaml --group  --nodes-per-controller 100 --node-selector-key kwok --node-selector-value true --toleration-key kwok --toleration-value true
      python3 kwok/kwok.py   --action validate   --node-count 100   --node-manifest-path $(Pipeline.Workspace)/s/kcl/hyperscale_apiserver_executing_seats/kwok-node.yaml --group  --nodes-per-controller 100 --node-selector-key kwok --node-selector-value true --toleration-key kwok --toleration-value true
    workingDirectory: modules/python
    displayName: Create and Validate KWOK Nodes
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        if ! command -v docker &>/dev/null; then
          echo "##[error]Docker is not installed on this agent. Please use an agent pool with Docker pre-installed."
          exit 1
        fi
        echo "Docker found: $(docker --version)"

        mkdir -p /tmp/cl2-config /tmp/cl2-results

        cat > /tmp/cl2-config/overrides.yaml << 'OVERRIDE_EOF'
        NODES: 30
        PODS_PER_NODE: 10
        BIG_GROUP_SIZE: 8
        MEDIUM_GROUP_SIZE: 8
        SMALL_GROUP_SIZE: 4
        SMALL_STATEFUL_SETS_PER_NAMESPACE: 0
        MEDIUM_STATEFUL_SETS_PER_NAMESPACE: 0
        CL2_RATE_LIMIT_POD_CREATION: false
        CL2_ENABLE_PVS: false
        CL2_ENABLE_CLUSTER_OOMS_TRACKER: false
        CL2_DEFAULT_QPS: 5000
        CL2_RUN_ON_ARM_NODES: true
        OVERRIDE_EOF

        echo "=== CL2 Override Config ==="
        cat /tmp/cl2-config/overrides.yaml
        echo "==========================="

        docker run --rm   --network host   -v "$HOME/.kube/config:/root/.kube/config:rw"   -v "$HOME/.azure:/root/.azure:rw"   -v "/tmp/cl2-config:/root/perf-tests/clusterloader2/config:rw"   -v "/tmp/cl2-results:/root/perf-tests/clusterloader2/results:rw"   ghcr.io/azure/clusterloader2:v20260220   --provider=aks   --v=2   --testoverrides=/root/perf-tests/clusterloader2/config/overrides.yaml   --testconfig=testing/load/config.yaml   --kubeconfig=/root/.kube/config   --report-dir=/root/perf-tests/clusterloader2/results   --k8s-clients-number=500

        echo "=== CL2 Results ==="
        ls -la /tmp/cl2-results/
    displayName: Run CL2 locally on agent
  - task: AzureCLI@2
    inputs:
      azureSubscription: Azure-for-Telescope-internal
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -exo pipefail

        az group delete --name "$(RUN_ID)" --subscription "b8ceb4e5-f05b-4562-a9f5-14acb1f24219" --yes
    condition: always()
    displayName: Delete resource group $(RUN_ID) (b8ceb4e5-f05b-4562-a9f5-14acb1f24219)
