apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-override
  namespace: clusterloader2
data:
  override.yaml: |
    NODES: 12000
    PODS_PER_NODE: 30
    BIG_GROUP_SIZE: 1
    MEDIUM_GROUP_SIZE: 1
    SMALL_GROUP_SIZE: 1
    SMALL_STATEFUL_SETS_PER_NAMESPACE: 0
    MEDIUM_STATEFUL_SETS_PER_NAMESPACE: 0
    CL2_SMALL_JOBS_PER_NAMESPACE: 0
    CL2_MEDIUM_JOBS_PER_NAMESPACE: 0
    CL2_BIG_JOBS_PER_NAMESPACE: 0
    CL2_RATE_LIMIT_POD_CREATION: false
    CL2_ENABLE_PVS: false
    CL2_ENABLE_CLUSTER_OOMS_TRACKER: false
    CL2_DEFAULT_QPS: 4000
    CL2_RUN_ON_ARM_NODES: true
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cl2
  namespace: clusterloader2
spec:
  completions: 8
  parallelism: 8
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - '--provider=aks'
        - '--run-from-cluster=true'
        - '--v=2'
        - '--testoverrides=/override/override.yaml'
        - '--testconfig=testing/load/config-noservice.yaml'
        - '--k8s-clients-number=500'
        image: ghcr.io/azure/clusterloader2:v20260220
        name: cl2
        resources:
          requests:
            cpu: '6'
            memory: '24Gi'
        volumeMounts:
        - mountPath: /override
          name: cl2-override
        # Mount a custom config.yaml from the cl2-testconfig ConfigMap. This version
        # removes the service creation part, as service IPs become uncontrollable at
        # large scale with high node and pod counts.
        - mountPath: /root/perf-tests/clusterloader2/testing/load/config-noservice.yaml
          name: cl2-testconfig
          subPath: config.yaml
      nodeSelector:
        agentpool: cl2pool
      restartPolicy: Never
      serviceAccountName: cl2
      tolerations:
      - effect: NoSchedule
        key: cl2pool
        operator: Exists
      volumes:
      - configMap:
          name: cl2-override
        name: cl2-override
      - configMap:
          name: cl2-testconfig
        name: cl2-testconfig
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cl2
  namespace: clusterloader2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cl2
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cl2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cl2
subjects:
- kind: ServiceAccount
  name: cl2
  namespace: clusterloader2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-testconfig
  namespace: clusterloader2
data:
  config.yaml: |
    # ASSUMPTIONS:
    # - Underlying cluster should have 100+ nodes.
    # - Number of nodes should be divisible by NODES_PER_NAMESPACE (default 100).
    # - The number of created SVCs is half the number of created Deployments.
    # - Only half of Deployments will be assigned 1-1 to existing SVCs.

    #Constants
    # Cater for the case where the number of nodes is less than nodes per namespace. See https://github.com/kubernetes/perf-tests/issues/887
    {{$NODES_PER_NAMESPACE := MinInt .Nodes (DefaultParam .NODES_PER_NAMESPACE 100)}}
    # See https://github.com/kubernetes/perf-tests/pull/1667#issuecomment-769642266
    {{$IS_SMALL_CLUSTER := lt .Nodes 100}}
    {{$PODS_PER_NODE := DefaultParam .PODS_PER_NODE 30}}
    {{$LOAD_TEST_THROUGHPUT := DefaultParam .CL2_LOAD_TEST_THROUGHPUT 10}}
    {{$DELETE_TEST_THROUGHPUT := DefaultParam .CL2_DELETE_TEST_THROUGHPUT $LOAD_TEST_THROUGHPUT}}
    {{$RATE_LIMIT_POD_CREATION := DefaultParam .CL2_RATE_LIMIT_POD_CREATION true}}
    {{$BIG_GROUP_SIZE := DefaultParam .BIG_GROUP_SIZE 250}}
    {{$MEDIUM_GROUP_SIZE := DefaultParam .MEDIUM_GROUP_SIZE 30}}
    {{$SMALL_GROUP_SIZE := DefaultParam .SMALL_GROUP_SIZE 5}}
    {{$SMALL_STATEFUL_SETS_PER_NAMESPACE := DefaultParam .SMALL_STATEFUL_SETS_PER_NAMESPACE 1}}
    {{$MEDIUM_STATEFUL_SETS_PER_NAMESPACE := DefaultParam .MEDIUM_STATEFUL_SETS_PER_NAMESPACE 1}}
    {{$ENABLE_CHAOSMONKEY := DefaultParam .ENABLE_CHAOSMONKEY false}}
    {{$ENABLE_API_AVAILABILITY_MEASUREMENT := DefaultParam .CL2_ENABLE_API_AVAILABILITY_MEASUREMENT false}}
    {{$ENABLE_NETWORK_POLICY_ENFORCEMENT_LATENCY_TEST := DefaultParam .CL2_ENABLE_NETWORK_POLICY_ENFORCEMENT_LATENCY_TEST false}}
    {{$RANDOM_SCALE_FACTOR := 0.5}}
    #Variables
    {{$namespaces := DivideInt .Nodes $NODES_PER_NAMESPACE}}
    {{$totalPods := MultiplyInt $namespaces $NODES_PER_NAMESPACE $PODS_PER_NODE}}
    {{$podsPerNamespace := DivideInt $totalPods $namespaces}}
    {{$saturationTime := DivideInt $totalPods $LOAD_TEST_THROUGHPUT}}
    {{$deletionTime := DivideInt $totalPods $DELETE_TEST_THROUGHPUT}}
    # bigDeployments - 1/4 of namespace pods should be in big Deployments.
    {{$bigDeploymentsPerNamespace := DivideInt $podsPerNamespace (MultiplyInt 4 $BIG_GROUP_SIZE)}}
    # mediumDeployments - 1/4 of namespace pods should be in medium Deployments.
    {{$mediumDeploymentsPerNamespace := DivideInt $podsPerNamespace (MultiplyInt 4 $MEDIUM_GROUP_SIZE)}}
    # smallDeployments - 1/2 of namespace pods should be in small Deployments.
    {{$smallDeploymentsPerNamespace := DivideInt $podsPerNamespace (MultiplyInt 2 $SMALL_GROUP_SIZE)}}

    # Stateful sets are enabled. Reduce the number of small and medium deployments per namespace
    # See https://github.com/kubernetes/perf-tests/issues/1036#issuecomment-607631768
    # Ensure non zero or negative after subtraction.
    {{$smallDeploymentsPerNamespace := MaxInt 0 (SubtractInt $smallDeploymentsPerNamespace $SMALL_STATEFUL_SETS_PER_NAMESPACE)}}
    {{$mediumDeploymentsPerNamespace := MaxInt 0 (SubtractInt $mediumDeploymentsPerNamespace $MEDIUM_STATEFUL_SETS_PER_NAMESPACE)}}

    # Jobs are enabled. Reduce the number of small, medium, big deployments per namespace.
    # Ensure non zero or negative after subtraction.
    {{$smallDeploymentsPerNamespace := MaxInt 0 (SubtractInt $smallDeploymentsPerNamespace 1)}}
    {{$mediumDeploymentsPerNamespace := MaxInt 0 (SubtractInt $mediumDeploymentsPerNamespace 1)}}
    {{$bigDeploymentsPerNamespace := MaxInt 0 (SubtractInt $bigDeploymentsPerNamespace 1)}}

    # Disable big jobs on small clusters.
    {{$bigJobsPerNamespace := IfThenElse $IS_SMALL_CLUSTER 0 1}}

    # The minimal number of pods to be used to measure various things like
    # pod-startup-latency or scheduler-throughput. The purpose of it is to avoid
    # problems in small clusters where we wouldn't have enough samples (pods) to
    # measure things accurately.
    {{$MIN_PODS_IN_SMALL_CLUSTERS := 500}}

    # BEGIN scheduler-throughput section
    # TODO( https://github.com/kubernetes/perf-tests/issues/1027): Lower the number of "min-pods" once we fix the scheduler throughput measurement.
    {{$totalSchedulerThroughputPods := MaxInt (MultiplyInt 2 $MIN_PODS_IN_SMALL_CLUSTERS) .Nodes}}
    # Determines number of pods per deployment. Should be a divider of $totalSchedulerThroughputPods.
    {{$schedulerThroughputPodsPerDeployment := DefaultParam .CL2_SCHEDULER_THROUGHPUT_PODS_PER_DEPLOYMENT $totalSchedulerThroughputPods}}
    {{$schedulerThroughputNamespaces := DivideInt $totalSchedulerThroughputPods $schedulerThroughputPodsPerDeployment}}

    # Set schedulerThroughputNamespaces to 1 on small clusters otherwise it will result
    # in an unnecessary number of namespaces.
    {{$schedulerThroughputNamespaces := IfThenElse $IS_SMALL_CLUSTER 1 $schedulerThroughputNamespaces}}
    # END scheduler-throughput section

    # Command to be executed
    {{$EXEC_COMMAND := DefaultParam .CL2_EXEC_COMMAND nil}}
    {{$EXIT_AFTER_EXEC := DefaultParam .CL2_EXIT_AFTER_EXEC false}}
    {{$EXEC_TIMEOUT := DefaultParam .CL2_EXEC_TIMEOUT "3600s"}}
    {{$SLEEP_AFTER_EXEC_DURATION := DefaultParam .CL2_SLEEP_AFTER_EXEC_DURATION "0s"}}

    {{$registry := DefaultParam .CL2_LATENCY_POD_REGISTRY "registry.k8s.io"}}
    {{$latencyPodImage := DefaultParam .CL2_LATENCY_POD_IMAGE (Concat $registry "/pause:3.9")}}
    {{$defaultQps := DefaultParam .CL2_DEFAULT_QPS (IfThenElse (le .Nodes 500) 10 100)}}

    {{$ADDITIONAL_MEASUREMENT_MODULES := DefaultParam .CL2_ADDITIONAL_MEASUREMENT_MODULES nil}}
    {{$ADDITIONAL_PHASES_MODULES := DefaultParam .CL2_ADDITIONAL_PHASES_MODULES nil}}

    name: load
    namespace:
      number: {{AddInt $namespaces $schedulerThroughputNamespaces}}
    tuningSets:
    - name: Sequence
      parallelismLimitedLoad:
        parallelismLimit: 1
    # TODO(https://github.com/kubernetes/perf-tests/issues/1024): This TuningSet is used only for pod-startup-latency, get rid of it
    # Uniform5qps: for each running phase, use 5 qps.
    - name: Uniform5qps
      qpsLoad:
        qps: 5
    # default is a tuningset that is meant to be used when we don't have any specific requirements on pace of operations.
    - name: default
      globalQPSLoad:
        qps: {{$defaultQps}}
        burst: 8000
    - name: RandomizedSaturationTimeLimited
      RandomizedTimeLimitedLoad:
        timeLimit: {{$saturationTime}}s
    - name: RandomizedScalingTimeLimited
      RandomizedTimeLimitedLoad:
        # The expected number of created/deleted pods is totalPods/4 when scaling,
        # as each RS changes its size from X to a uniform random value in [X/2, 3X/2].
        # To match 10 [pods/s] requirement, we need to divide saturationTime by 4.
        timeLimit: {{DivideInt $saturationTime 4}}s
    - name: RandomizedDeletionTimeLimited
      RandomizedTimeLimitedLoad:
        timeLimit: {{$deletionTime}}s
    {{if $ENABLE_CHAOSMONKEY}}
    chaosMonkey:
      nodeFailure:
        failureRate: 0.01
        interval: 5m
        jitterFactor: 2.0
        simulatedDowntime: 10m
    {{end}}
    steps:
    - module:
        path: /modules/measurements.yaml
        params:
          action: start

    {{if $ADDITIONAL_MEASUREMENT_MODULES}}
    {{range $ADDITIONAL_MEASUREMENT_MODULES}}
    - module:
        path: {{.}}
        params:
          action: start
    {{end}}
    {{end}}

    {{if $ENABLE_NETWORK_POLICY_ENFORCEMENT_LATENCY_TEST}}
    - module:
        path: modules/network-policy/net-policy-enforcement-latency.yaml
        params:
          setup: true
          run: true
          testType: "pod-creation"
    {{end}}

    - name: Creating PriorityClass for DaemonSets
      phases:
      - replicasPerNamespace: 1
        tuningSet: Sequence
        objectBundle:
          - basename: daemonset-priorityclass
            objectTemplatePath: daemonset-priorityclass.yaml

    # Moved from reconcile-objects.yaml to mitigate https://github.com/kubernetes/kubernetes/issues/96635.
    # TODO(https://github.com/kubernetes/perf-tests/issues/1823): Merge back to reconcile-objects.yaml once the k/k bug is fixed.
    - module:
        path: /modules/configmaps-secrets.yaml
        params:
          actionName: create
          tuningSet: default
          namespaces: {{$namespaces}}
          bigDeploymentsPerNamespace: {{$bigDeploymentsPerNamespace}}
          mediumDeploymentsPerNamespace: {{$mediumDeploymentsPerNamespace}}
          smallDeploymentsPerNamespace: {{$smallDeploymentsPerNamespace}}

    - module:
        path: /modules/reconcile-objects.yaml
        params:
          actionName: "create"
          namespaces: {{$namespaces}}
          {{if $RATE_LIMIT_POD_CREATION}}
          tuningSet: RandomizedSaturationTimeLimited
          operationTimeout: 15m
          {{else}}
          tuningSet: default
          operationTimeout: {{AddInt $saturationTime 900}}s
          {{end}}
          testMaxReplicaFactor: {{$RANDOM_SCALE_FACTOR}}
          # We rely on the fact that daemonset is using the same image as the 'pod-startup-latency' module.
          # The goal is to cache the image to all nodes before we start any latency pod,
          # so that when we measure pod startup latency, the image is already present on all nodes.
          # This way, the pod startup latency we measure excludes (or limits impact) of image pulling,
          # whuch matches our SLO definition: https://github.com/kubernetes/community/blob/master/sig-scalability/slos/pod_startup_latency.md.
          daemonSetImage: {{$latencyPodImage}}
          deploymentImage: {{$latencyPodImage}}
          jobImage: {{$latencyPodImage}}
          statefulSetImage: {{$latencyPodImage}}
          daemonSetEnv: "before update"
          daemonSetReplicas: 1
          bigDeploymentSize: {{$BIG_GROUP_SIZE}}
          bigDeploymentsPerNamespace: {{$bigDeploymentsPerNamespace}}
          mediumDeploymentSize: {{$MEDIUM_GROUP_SIZE}}
          mediumDeploymentsPerNamespace: {{$mediumDeploymentsPerNamespace}}
          smallDeploymentSize: {{$SMALL_GROUP_SIZE}}
          smallDeploymentsPerNamespace: {{$smallDeploymentsPerNamespace}}
          smallStatefulSetSize: {{$SMALL_GROUP_SIZE}}
          smallStatefulSetsPerNamespace: {{$SMALL_STATEFUL_SETS_PER_NAMESPACE}}
          mediumStatefulSetSize: {{$MEDIUM_GROUP_SIZE}}
          mediumStatefulSetsPerNamespace: {{$MEDIUM_STATEFUL_SETS_PER_NAMESPACE}}
          bigJobSize: {{$BIG_GROUP_SIZE}}
          bigJobsPerNamespace: {{$bigJobsPerNamespace}}
          mediumJobSize: {{$MEDIUM_GROUP_SIZE}}
          mediumJobsPerNamespace: 1
          smallJobSize: {{$SMALL_GROUP_SIZE}}
          smallJobsPerNamespace: 1

    {{if $ADDITIONAL_PHASES_MODULES}}
    {{range $ADDITIONAL_PHASES_MODULES}}
    - module:
        path: {{.}}
        params:
          action: "create"
    {{end}}
    {{end}}

    {{if not $IS_SMALL_CLUSTER}}
    # BEGIN scheduler throughput
    - module:
        path: modules/scheduler-throughput.yaml
        params:
          action: create
          namespaces: {{$namespaces}}
          replicasPerNamespace: 1
          schedulerThroughputNamespaces: {{$schedulerThroughputNamespaces}}
          schedulerThroughputPodsPerDeployment: {{$schedulerThroughputPodsPerDeployment}}
          deploymentImage: {{$latencyPodImage}}
    {{end}}

    - module:
        path: modules/dns-k8s-hostnames.yaml

    {{if $EXEC_COMMAND}}

    {{if $ENABLE_API_AVAILABILITY_MEASUREMENT}}
    - name: Pausing APIAvailability measurement
      measurements:
      - Identifier: APIAvailability
        Method: APIAvailability
        Params:
          action: pause
    {{end}}

    - name: Exec command
      measurements:
      - Identifier: ExecCommand
        Method: Exec
        Params:
          timeout: {{$EXEC_TIMEOUT}}
          command:
          {{range $EXEC_COMMAND}}
          - {{.}}
          {{end}}

    {{if $ENABLE_API_AVAILABILITY_MEASUREMENT}}
    - name: Unpausing APIAvailability measurement
      measurements:
      - Identifier: APIAvailability
        Method: APIAvailability
        Params:
          action: unpause
    {{end}}

    - name: Sleep
      measurements:
      - Identifier: WaitAfterExec
        Method: Sleep
        Params:
          duration: {{$SLEEP_AFTER_EXEC_DURATION}}
    {{end}}

    {{if not $EXIT_AFTER_EXEC}}

    {{if not $IS_SMALL_CLUSTER}}
    - module:
        path: modules/scheduler-throughput.yaml
        params:
          action: delete
          namespaces: {{$namespaces}}
          replicasPerNamespace: 0
          schedulerThroughputNamespaces: {{$schedulerThroughputNamespaces}}
          schedulerThroughputPodsPerDeployment: {{$schedulerThroughputPodsPerDeployment}}
    # END scheduler throughput
    {{end}}

    {{if not $IS_SMALL_CLUSTER}}
    # TODO(kubernetes/perf-tests/issues/1024): We shouldn't have a dedicated module for measuring pod-startup-latency.
    - module:
        path: modules/pod-startup-latency.yaml
        params:
          namespaces: {{$namespaces}}
          minPodsInSmallCluster: {{$MIN_PODS_IN_SMALL_CLUSTERS}}
          image: {{$latencyPodImage}}
    {{end}}

    {{if $ENABLE_NETWORK_POLICY_ENFORCEMENT_LATENCY_TEST}}
    - module:
        path: modules/network-policy/net-policy-metrics.yaml
        params:
          action: gather
          usePolicyCreationMetrics: false

    - module:
        path: modules/network-policy/net-policy-enforcement-latency.yaml
        params:
          complete: true
          testType: "pod-creation"

    - module:
        path: modules/network-policy/net-policy-enforcement-latency.yaml
        params:
          run: true
          testType: "policy-creation"
    {{end}}

    - module:
        path: /modules/reconcile-objects.yaml
        params:
          actionName: "scale and update"
          namespaces: {{$namespaces}}
          {{if $RATE_LIMIT_POD_CREATION}}
          tuningSet: RandomizedScalingTimeLimited
          operationTimeout: 15m
          {{else}}
          tuningSet: default
          operationTimeout: {{AddInt (DivideInt $saturationTime 4) 900}}s
          {{end}}
          randomScaleFactor: {{$RANDOM_SCALE_FACTOR}}
          testMaxReplicaFactor: {{$RANDOM_SCALE_FACTOR}}
          daemonSetImage: {{$latencyPodImage}}
          deploymentImage: {{$latencyPodImage}}
          jobImage: {{$latencyPodImage}}
          statefulSetImage: {{$latencyPodImage}}
          daemonSetEnv: "after update"
          daemonSetReplicas: 1
          bigDeploymentSize: {{$BIG_GROUP_SIZE}}
          bigDeploymentsPerNamespace: {{$bigDeploymentsPerNamespace}}
          mediumDeploymentSize: {{$MEDIUM_GROUP_SIZE}}
          mediumDeploymentsPerNamespace: {{$mediumDeploymentsPerNamespace}}
          smallDeploymentSize: {{$SMALL_GROUP_SIZE}}
          smallDeploymentsPerNamespace: {{$smallDeploymentsPerNamespace}}
          smallStatefulSetSize: {{$SMALL_GROUP_SIZE}}
          smallStatefulSetsPerNamespace: {{$SMALL_STATEFUL_SETS_PER_NAMESPACE}}
          mediumStatefulSetSize: {{$MEDIUM_GROUP_SIZE}}
          mediumStatefulSetsPerNamespace: {{$MEDIUM_STATEFUL_SETS_PER_NAMESPACE}}
          bigJobSize: {{$BIG_GROUP_SIZE}}
          bigJobsPerNamespace: {{$bigJobsPerNamespace}}
          mediumJobSize: {{$MEDIUM_GROUP_SIZE}}
          mediumJobsPerNamespace: 1
          smallJobSize: {{$SMALL_GROUP_SIZE}}
          smallJobsPerNamespace: 1

    {{if $ADDITIONAL_PHASES_MODULES}}
    {{range $ADDITIONAL_PHASES_MODULES}}
    - module:
        path: {{.}}
        params:
          action: "scale and update"
    {{end}}
    {{end}}

    - module:
        path: /modules/reconcile-objects.yaml
        params:
          actionName: "delete"
          namespaces: {{$namespaces}}
          {{if $RATE_LIMIT_POD_CREATION}}
          tuningSet: RandomizedDeletionTimeLimited
          operationTimeout: 15m
          {{else}}
          tuningSet: default
          operationTimeout: {{AddInt $deletionTime 900}}s
          {{end}}
          testMaxReplicaFactor: {{$RANDOM_SCALE_FACTOR}}
          daemonSetImage: {{$latencyPodImage}}
          deploymentImage: {{$latencyPodImage}}
          jobImage: {{$latencyPodImage}}
          statefulSetImage: {{$latencyPodImage}}
          daemonSetReplicas: 0
          bigDeploymentSize: {{$BIG_GROUP_SIZE}}
          bigDeploymentsPerNamespace: 0
          mediumDeploymentSize: {{$MEDIUM_GROUP_SIZE}}
          mediumDeploymentsPerNamespace: 0
          smallDeploymentSize: {{$SMALL_GROUP_SIZE}}
          smallDeploymentsPerNamespace: 0
          smallStatefulSetSize: {{$SMALL_GROUP_SIZE}}
          smallStatefulSetsPerNamespace: 0
          mediumStatefulSetSize: {{$MEDIUM_GROUP_SIZE}}
          mediumStatefulSetsPerNamespace: 0
          bigJobSize: {{$BIG_GROUP_SIZE}}
          bigJobsPerNamespace: 0
          mediumJobSize: {{$MEDIUM_GROUP_SIZE}}
          mediumJobsPerNamespace: 0
          smallJobSize: {{$SMALL_GROUP_SIZE}}
          smallJobsPerNamespace: 0
          pvSmallStatefulSetSize: {{$SMALL_STATEFUL_SETS_PER_NAMESPACE}}
          pvMediumStatefulSetSize: {{$MEDIUM_STATEFUL_SETS_PER_NAMESPACE}}

    {{if $ADDITIONAL_PHASES_MODULES}}
    {{range $ADDITIONAL_PHASES_MODULES}}
    - module:
        path: {{.}}
        params:
          action: "delete"
    {{end}}
    {{end}}

    - module:
        path: /modules/configmaps-secrets.yaml
        params:
          actionName: delete
          tuningSet: default
          namespaces: {{$namespaces}}
          bigDeploymentsPerNamespace: 0
          mediumDeploymentsPerNamespace: 0
          smallDeploymentsPerNamespace: 0

    - name: Deleting PriorityClass for DaemonSets
      phases:
        - replicasPerNamespace: 0
          tuningSet: Sequence
          objectBundle:
            - basename: daemonset-priorityclass
              objectTemplatePath: daemonset-priorityclass.yaml

    {{end}} # not EXIT_AFTER_EXEC

    - module:
        path: /modules/measurements.yaml
        params:
          action: gather

    {{if $ADDITIONAL_MEASUREMENT_MODULES}}
    {{range $ADDITIONAL_MEASUREMENT_MODULES}}
    - module:
        path: {{.}}
        params:
          action: gather
    {{end}}
    {{end}}

    {{if $ENABLE_NETWORK_POLICY_ENFORCEMENT_LATENCY_TEST}}
    - module:
        path: modules/network-policy/net-policy-enforcement-latency.yaml
        params:
          complete: true
          testType: "policy-creation"
    {{end}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-read-override
  namespace: clusterloader2
data:
  override.yaml: |
    # Total client-side inflight LIST = PODS * INFLIGHT_PER_POD.
    CL2_LIST_BENCHMARK_PODS: 144        # number of lister pods (Deployment replicas)
    CL2_LIST_INFLIGHT_PER_POD: 200      # goroutines per pod, each in a tight LIST loop (binary --inflight flag); kept ≤ HTTP/2 stream limit (~250)
    # Per-LIST response = NUMBER * BYTES ≈ 5MB. Bumping these to make LISTs heavier
    # (to keep readOnly inflight count high) backfired in a prior run — readOnly seats
    # dropped to ~240, suspected lister OOM and/or APF queueing. Keep small until the
    # failure mode is confirmed.
    CL2_LIST_CONFIG_MAP_NUMBER: 10000
    CL2_LIST_CONFIG_MAP_BYTES: 10000
    CL2_LIST_BENCHMARK_CPU: "500m"
    CL2_LIST_BENCHMARK_MEMORY: "2048Mi"
    # Estimated load test duration. Read driver Sleeps for this long, then exits cleanly
    # so its CL2 measurement gather step runs and its report is captured. RunClusterLoader2
    # waits for both load + read to reach terminal, so don't set this larger than expected
    # load test runtime or the pipeline will idle waiting for read.
    CL2_LIST_BENCHMARK_DURATION: "90m"
---
# Override files mounted on top of the cl2 image's testing/list/ tree.
# - config.yaml: parameterizes the upstream-hardcoded 5m Sleep so duration is tunable.
# - modules/list-benchmark.yaml: passes Inflight, Cpu, Memory through to deployment.
# - deployment.yaml: adds --inflight flag and accepts Cpu/Memory templateFillMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-read-testconfig
  namespace: clusterloader2
data:
  config.yaml: |
    # List benchmark (telescope override of testing/list/config.yaml).
    {{$configMapBytes := DefaultParam .CL2_LIST_CONFIG_MAP_BYTES 100000}}
    {{$configMapNumber := DefaultParam .CL2_LIST_CONFIG_MAP_NUMBER 10000}}
    {{$configMapGroup := DefaultParam .CL2_LIST_CONFIG_MAP_GROUP "list-configmap"}}

    {{$listReplicas := DefaultParam .CL2_LIST_BENCHMARK_PODS 1}}
    {{$contentType := DefaultParam .CL2_LIST_BENCHMARK_CONTENT_TYPE "json"}}
    {{$inflight := DefaultParam .CL2_LIST_INFLIGHT_PER_POD 1}}
    {{$cpu := DefaultParam .CL2_LIST_BENCHMARK_CPU "1250m"}}
    {{$memory := DefaultParam .CL2_LIST_BENCHMARK_MEMORY "32Mi"}}
    {{$duration := DefaultParam .CL2_LIST_BENCHMARK_DURATION "5m"}}

    name: list-benchmark
    namespace:
      number: 1
    tuningSets:
    - name: Sequence
      parallelismLimitedLoad:
        parallelismLimit: 100
    steps:
    - name: Setup namespace for list benchmark pods
      phases:
      - replicasPerNamespace: 1
        tuningSet: Sequence
        objectBundle:
        - basename: list-benchmark
          objectTemplatePath: namespace.yaml
    - name: Setup permissions
      phases:
      - replicasPerNamespace: 1
        tuningSet: Sequence
        objectBundle:
        - basename: list-clusterrole
          objectTemplatePath: clusterrole.yaml
      - replicasPerNamespace: 1
        tuningSet: Sequence
        objectBundle:
        - basename: list-clusterrolebinding
          objectTemplatePath: clusterrolebinding.yaml
      - namespaceRange:
          min: 1
          max: 1
        replicasPerNamespace: 1
        tuningSet: Sequence
        objectBundle:
        - basename: list-rolebinding
          objectTemplatePath: rolebinding.yaml

    - name: Create configmaps
      phases:
      - namespaceRange:
          min: 1
          max: 1
        tuningSet: Sequence
        replicasPerNamespace: {{$configMapNumber}}
        objectBundle:
        - basename: {{$configMapGroup}}
          objectTemplatePath: configmap.yaml
          templateFillMap:
            bytes: {{$configMapBytes}}
            group: {{$configMapGroup}}

    - module:
        path: modules/list-benchmark.yaml
        params:
          namePrefix: "list-configmaps-"
          replicas: {{$listReplicas}}
          uri: /api/v1/configmaps?resourceVersion=0
          namespaced: false
          contentType: {{$contentType}}
          inflight: {{$inflight}}
          cpu: {{$cpu}}
          memory: {{$memory}}
    # Skip /modules/measurements.yaml — APIResponsivenessPrometheus + TestMetrics
    # report aren't useful for our purpose (we read seat metrics from prometheus
    # directly) and they fail at gather time when apiserver is under heavy load.
    - name: Sustain LIST inflight
      measurements:
        - Identifier: Wait
          Method: Sleep
          Params:
            duration: {{$duration}}
    - module:
        path: modules/list-benchmark.yaml
        params:
          namePrefix: "list-configmaps-"
          replicas: 0
  list-benchmark.yaml: |
    {{$namePrefix := DefaultParam .namePrefix "list-benchmark-"}}
    {{$replicas := DefaultParam .replicas 0}}
    {{$uri := DefaultParam .uri "/"}}
    {{$contentType := DefaultParam .contentType "json"}}
    {{$inflight := DefaultParam .inflight 1}}
    {{$cpu := DefaultParam .cpu "1250m"}}
    {{$memory := DefaultParam .memory "32Mi"}}

    steps:
    - name: Creating WaitForControlledPodsRunning measurement
      measurements:
      - Identifier: WaitForListBenchmarkDeployment
        Method: WaitForControlledPodsRunning
        Params:
          action: start
          apiVersion: apps/v1
          checkIfPodsAreUpdated: true
          kind: Deployment
          labelSelector: group = benchmark
          operationTimeout: 5m
    - name: Deploying {{$namePrefix}}deployment
      phases:
      - tuningSet: Sequence
        replicasPerNamespace: 1
        namespaceRange:
          min: 0
          max: 0
          basename: list-benchmark
        objectBundle:
        - basename: {{$namePrefix}}deploy
          objectTemplatePath: deployment.yaml
          templateFillMap:
            Replicas: {{$replicas}}
            Uri: {{$uri}}
            ContentType: {{$contentType}}
            Inflight: {{$inflight}}
            Cpu: {{$cpu}}
            Memory: {{$memory}}
    - name: Waiting for WaitForControlledPodsRunning gather
      measurements:
      - Identifier: WaitForListBenchmarkDeployment
        Method: WaitForControlledPodsRunning
        Params:
          action: gather
  deployment.yaml: |
    # Source of image: https://github.com/kubernetes/perf-tests/tree/master/util-images/request-benchmark
    {{$image := DefaultParam .CL2_BENCHMARK_IMAGE "gcr.io/k8s-testimages/perf-tests-util/request-benchmark:latest"}}
    {{$cpu := DefaultParam .Cpu "1250m"}}
    {{$memory := DefaultParam .Memory "32Mi"}}
    {{$inflight := DefaultParam .Inflight 1}}

    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{.Name}}
      labels:
        group: benchmark
    spec:
      replicas: {{.Replicas}}
      selector:
        matchLabels:
          name: {{.Name}}
      template:
        metadata:
          labels:
            name: {{.Name}}
            group: benchmark
        spec:
          containers:
          - name: {{.Name}}
            image: {{$image}}
            imagePullPolicy: Always
            args:
            - --namespace={{.Namespace}}
            - --uri={{.Uri}}
            - --content-type={{.ContentType}}
            - --inflight={{$inflight}}
            resources:
              requests:
                cpu: {{$cpu}}
                memory: {{$memory}}
              limits:
                cpu: {{$cpu}}
                memory: {{$memory}}
---
# Dedicated APF priority level for the read benchmark. nominalConcurrencyShares
# 325 takes ~57% of the apiserver seat budget (~5474 of ~9600 total). Combined
# with workload-low's reduced share (~1684 for load), our test reaches ~7160
# combined seats — up from ~6000 today. lendablePercent: 0 keeps these seats
# locked to this PL. Side effects: workload-low shrinks ~57% (load test slows
# accordingly) and system PLs share ~2442 seats (scheduler/kubelet/controllers
# tighter but functional). Acceptable on a dedicated benchmark cluster.
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: PriorityLevelConfiguration
metadata:
  name: cl2-read
spec:
  type: Limited
  limited:
    nominalConcurrencyShares: 325
    lendablePercent: 0
    limitResponse:
      type: Queue
      queuing:
        queues: 64
        handSize: 8
        queueLengthLimit: 100
---
# Match the lister Deployment's pod identity (default SA in list-benchmark-0,
# which CL2's testing/list/config.yaml creates) and route its LIST configmaps
# requests to the dedicated PL above. matchingPrecedence < 9000 (the default
# service-accounts FS precedence) ensures this rule wins.
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: FlowSchema
metadata:
  name: cl2-read
spec:
  matchingPrecedence: 100
  priorityLevelConfiguration:
    name: cl2-read
  distinguisherMethod:
    type: ByUser
  rules:
  - subjects:
    - kind: ServiceAccount
      serviceAccount:
        name: default
        namespace: list-benchmark-0
    resourceRules:
    - verbs: ["list", "get", "watch"]
      apiGroups: [""]
      resources: ["configmaps"]
      clusterScope: true
      namespaces: ["*"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cl2-read
  namespace: clusterloader2
spec:
  completions: 2
  parallelism: 2
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - '--provider=aks'
        - '--run-from-cluster=true'
        - '--v=2'
        - '--testoverrides=/override/override.yaml'
        - '--testconfig=testing/list/config.yaml'
        image: ghcr.io/azure/clusterloader2:v20260220
        name: cl2-read
        resources:
          requests:
            cpu: '2'
            memory: '4Gi'
        volumeMounts:
        - mountPath: /override
          name: cl2-read-override
        # Mount custom config + module + deployment over the in-image testing/list/ tree.
        - mountPath: /root/perf-tests/clusterloader2/testing/list/config.yaml
          name: cl2-read-testconfig
          subPath: config.yaml
        - mountPath: /root/perf-tests/clusterloader2/testing/list/modules/list-benchmark.yaml
          name: cl2-read-testconfig
          subPath: list-benchmark.yaml
        - mountPath: /root/perf-tests/clusterloader2/testing/list/deployment.yaml
          name: cl2-read-testconfig
          subPath: deployment.yaml
      nodeSelector:
        agentpool: cl2pool
      restartPolicy: Never
      serviceAccountName: cl2
      tolerations:
      - effect: NoSchedule
        key: cl2pool
        operator: Exists
      volumes:
      - configMap:
          name: cl2-read-override
        name: cl2-read-override
      - configMap:
          name: cl2-read-testconfig
        name: cl2-read-testconfig
