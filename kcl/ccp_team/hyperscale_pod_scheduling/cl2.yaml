apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-override
  namespace: clusterloader2
data:
  override.yaml: |
    Nodes: 4000
    CL2_SCHEDULER_THROUGHPUT_TOTAL_PODS: 400000
    CL2_SCHEDULER_THROUGHPUT_PODS_PER_DEPLOYMENT: 1000
    CL2_DEFAULT_QPS: 2
    CL2_RUN_ON_ARM_NODES: true # This is a hack to allow Cl2 to run on Kwok nodes
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cl2
  namespace: clusterloader2
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 0 # Don't retry failed CL2 runs.
  template:
    spec:
      initContainers:
      - name: list-modules
        image: ghcr.io/azure/clusterloader2:v20260220
        command: ["find", "/root/perf-tests/clusterloader2/testing/load/modules", "-type", "f"]
      containers:
      - args:
        - '--provider=aks'
        - '--run-from-cluster=true'
        - '--v=2'
        - '--testoverrides=/override/override.yaml'
        - '--testconfig=testing/load/cl2-config.yaml'
        image: ghcr.io/azure/clusterloader2:v20260220
        name: cl2
        resources:
          requests:
            cpu: '6'
            memory: '24Gi'
        volumeMounts:
        - mountPath: /override
          name: cl2-override
        - mountPath: /root/perf-tests/clusterloader2/testing/load/cl2-config.yaml
          name: cl2-config
          subPath: config.yaml
        - mountPath: /root/perf-tests/clusterloader2/testing/load/simple-deployment.yaml
          name: cl2-simple-deployment
          subPath: simple-deployment.yaml
        - mountPath: /root/perf-tests/clusterloader2/testing/load/modules/scheduler-throughput.yaml
          name: cl2-scheduler-throughput
          subPath: scheduler-throughput.yaml
      nodeSelector:
        agentpool: cl2pool
      restartPolicy: Never
      serviceAccountName: cl2
      tolerations:
      - effect: NoSchedule
        key: cl2pool
        operator: Exists
      volumes:
      - configMap:
          name: cl2-override
        name: cl2-override
      - configMap:
          name: cl2-config
        name: cl2-config
      - configMap:
          name: cl2-simple-deployment
        name: cl2-simple-deployment
      - configMap:
          name: cl2-scheduler-throughput
        name: cl2-scheduler-throughput
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-scheduler-throughput
  namespace: clusterloader2
data:
  scheduler-throughput.yaml: |
    ## Input params
    # Valid actions: "create", "delete"
    {{$action := .action}}
    {{$namespaces := .namespaces}}
    {{$replicasPerNamespace := .replicasPerNamespace}}
    {{$schedulerThroughputNamespaces := .schedulerThroughputNamespaces}}
    {{$schedulerThroughputPodsPerDeployment := .schedulerThroughputPodsPerDeployment}}
    ## Derivative variables
    {{$is_creating := (eq .action "create")}}
    ## CL2 params
    {{$SCHEDULER_THROUGHPUT_THRESHOLD := DefaultParam .CL2_SCHEDULER_THROUGHPUT_THRESHOLD 100}}
    {{$CHECK_IF_PODS_ARE_UPDATED := DefaultParam .CL2_CHECK_IF_PODS_ARE_UPDATED true}}
    {{$deploymentImage := DefaultParam .deploymentImage "registry.k8s.io/pause:3.9"}}

    steps:
    {{if $is_creating}}
    - name: Creating scheduler throughput measurements
      measurements:
      - Identifier: HighThroughputPodStartupLatency
        Method: PodStartupLatency
        Params:
          action: start
          labelSelector: group = scheduler-throughput
          threshold: 3h
      - Identifier: WaitForSchedulerThroughputDeployments
        Method: WaitForControlledPodsRunning
        Params:
          action: start
          checkIfPodsAreUpdated: {{$CHECK_IF_PODS_ARE_UPDATED}}
          apiVersion: apps/v1
          kind: Deployment
          labelSelector: group = scheduler-throughput
          operationTimeout: 180m
      - Identifier: SchedulingThroughput
        Method: SchedulingThroughput
        Params:
          action: start
          labelSelector: group = scheduler-throughput
          measurmentInterval: 1s
    {{end}}
    - name: {{$action}} scheduler throughput pods
      phases:
      - namespaceRange:
          min: {{AddInt $namespaces 1}}
          max: {{AddInt $namespaces $schedulerThroughputNamespaces}}
        replicasPerNamespace: {{$replicasPerNamespace}}
        tuningSet: default
        objectBundle:
        - basename: scheduler-throughput-deployment
          objectTemplatePath: simple-deployment.yaml
          templateFillMap:
            Replicas: {{$schedulerThroughputPodsPerDeployment}}
            Group: scheduler-throughput
            Image: {{$deploymentImage}}
    - name: Waiting for scheduler throughput pods to be {{$action}}d
      measurements:
      - Identifier: WaitForSchedulerThroughputDeployments
        Method: WaitForControlledPodsRunning
        Params:
          action: gather
    {{if $is_creating}}
    - name: Collecting scheduler throughput measurements
      measurements:
      - Identifier: HighThroughputPodStartupLatency
        Method: PodStartupLatency
        Params:
          action: gather
      - Identifier: SchedulingThroughput
        Method: SchedulingThroughput
        Params:
          action: gather
          enableViolations: true
          threshold: {{$SCHEDULER_THROUGHPUT_THRESHOLD}}
    {{end}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cl2-simple-deployment
  namespace: clusterloader2
data:
  simple-deployment.yaml: |
    {{$HostNetworkMode := DefaultParam .CL2_USE_HOST_NETWORK_PODS false}}
    {{$CpuRequest := DefaultParam .CpuRequest "5m"}}
    {{$EnvVar := DefaultParam .EnvVar "a"}}
    {{$MemoryRequest := DefaultParam .MemoryRequest "20M"}}
    {{$Image := DefaultParam .Image "registry.k8s.io/pause:3.9"}}
    {{$RUN_ON_ARM_NODES := DefaultParam .CL2_RUN_ON_ARM_NODES false}}

    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{.Name}}
      labels:
        group: {{.Group}}
    spec:
      replicas: {{.Replicas}}
      selector:
        matchLabels:
          name: {{.Name}}
      template:
        metadata:
          labels:
            name: {{.Name}}
            group: {{.Group}}
    {{if .SvcName}}
            svc: {{.SvcName}}-{{.Index}}
    {{end}}
        spec:
          hostNetwork: {{$HostNetworkMode}}
          containers:
          - env:
            - name: ENV_VAR
              value: {{$EnvVar}}
            image: {{$Image}}
            imagePullPolicy: IfNotPresent
            name: {{.Name}}
            ports:
            resources:
              requests:
                cpu: {{$CpuRequest}}
                memory: {{$MemoryRequest}}
          nodeSelector:
            "kwok.x-k8s.io/node": "fake"
          tolerations:
          - key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 900
          - key: "node.kubernetes.io/unreachable"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 900
          - key: "kwok.x-k8s.io/node"
            operator: "Exists"
            effect: "NoSchedule"
          {{if $RUN_ON_ARM_NODES}}
          - key: "kubernetes.io/arch"
            operator: Equal
            value: arm64
            effect: NoSchedule
          {{end}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cl2
  namespace: clusterloader2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cl2
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cl2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cl2
subjects:
- kind: ServiceAccount
  name: cl2
  namespace: clusterloader2
